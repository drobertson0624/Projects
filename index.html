      const [newItemCat, setNewItemCat]       = useState("General");
      const [refreshing, setRefreshing]       = useState(false);

      const load = (spinner) => {
        if (spinner) setRefreshing(true);
        Promise.all([fetchOrders(), fetchInventory()]).then(([o, inv]) => {
          setOrders(o); setInventory(inv); setRefreshing(false);
        });
      };
      React.useEffect(() => { load(false); }, []);

      const STATUS = ["New","In Progress","Shipped"];
      const statusColor = s => s==="New"?"tag-blue":s==="In Progress"?"tag-warn":"tag-green";
      const statusBg    = s => s==="New"?"rgba(0,122,255,0.09)":s==="In Progress"?"var(--warn-light)":"var(--success-light)";
      const statusFg    = s => s==="New"?"var(--accent)":s==="In Progress"?"#8a5200":"#1a7a3a";

      const changeStatus = async (order, newStatus) => {
        setUpdatingId(order.id);
        await updateOrderStatus(order.id, newStatus);
        setOrders(os => os.map(o => o.id === order.id ? {...o, status: newStatus} : o));
        if (selected?.id === order.id) setSelected(s => ({...s, status: newStatus}));
        setUpdatingId(null);
      };

      const addInventoryItem = async () => {
        if (!newItemName.trim()) return;
        const item = { name: newItemName.trim(), category: newItemCat, active: true };
        await saveInventoryItem(item);
        setNewItemName(""); 
        fetchInventory().then(setInventory);
      };

      const removeInvItem = async (id) => {
        await deleteInventoryItem(id);
        setInventory(inv => inv.filter(i => i.id !== id));
      };

      return (
        <div style={{ padding:"24px 20px", maxWidth:1080, margin:"0 auto", width:"100%" }}>
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:12 }}>

              <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.025em" }}>Orders</div>

                {orders ? `${orders.length} order${orders.length!==1?"s":""}` : "Loading…"}
                {orders && <span style={{ marginLeft:10 }}>
                  {STATUS.map(s => { const c = orders.filter(o=>o.status===s).length; return c > 0 ? <span key={s} style={{ marginRight:8 }}><span style={{ padding:"2px 8px", borderRadius:100, fontSize:11, fontWeight:600, background:statusBg(s), color:statusFg(s) }}>{c} {s}</span></span> : null; })}
                </span>}
              </div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setShowInventory(true)} style={{ display:"flex", alignItems:"center", gap:6, padding:"9px 14px", border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:10, fontSize:13, fontWeight:500, cursor:"pointer", color:"var(--text-secondary)" }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                Manage Inventory
              </button>
              <button onClick={() => load(true)} disabled={refreshing} style={{ display:"flex", alignItems:"center", gap:6, padding:"9px 14px", border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:10, fontSize:13, fontWeight:500, cursor:"pointer", color:"var(--text-secondary)" }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ animation:refreshing?"spin 0.8s linear infinite":"none" }}><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Refresh
              </button>
            </div>
          </div>

          {/* Orders list */}
          {!orders ? (
            <div style={{ textAlign:"center", padding:"60px 24px", color:"var(--text-muted)", fontSize:14 }}>Loading orders…</div>
          ) : orders.length === 0 ? (
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:"60px 24px", textAlign:"center", boxShadow:"var(--shadow-sm)" }}>
              <div style={{ fontSize:16, fontWeight:600, marginBottom:8 }}>No orders yet</div>
              <div style={{ fontSize:14, color:"var(--text-muted)" }}>Go to the Churches tab and click "Place Order" on any church.</div>
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {orders.map(order => {
                const items = typeof order.items === "string" ? JSON.parse(order.items) : (order.items || []);
                const isSelected = selected?.id === order.id;
                return (
                  <div key={order.id} onClick={() => setSelected(isSelected ? null : order)} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:14, padding:"16px 18px", boxShadow:"var(--shadow-sm)", cursor:"pointer", transition:"box-shadow 0.15s" }}>
                    {/* Row header */}
                    <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                      <div style={{ fontSize:14, fontWeight:800, color:"var(--accent)", letterSpacing:"0.04em", minWidth:100 }}>{order.order_number}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:14, fontWeight:700 }}>{order.church_name || order.pastor_name}</div>
                        <div style={{ fontSize:12, color:"var(--text-muted)" }}>{order.region}{order.country?` · ${order.country}`:""} · {items.length} item{items.length!==1?"s":""}</div>
                      </div>
                      {/* Status selector */}
                      <div style={{ display:"flex", gap:4 }} onClick={e => e.stopPropagation()}>
                        {STATUS.map(s => (
                          <button key={s} onClick={() => changeStatus(order, s)} disabled={updatingId===order.id} style={{ padding:"5px 12px", borderRadius:20, border:"none", fontSize:12, fontWeight:600, cursor:"pointer", transition:"all 0.15s", background: order.status===s ? statusBg(s) : "var(--surface3)", color: order.status===s ? statusFg(s) : "var(--text-muted)", opacity: updatingId===order.id?0.5:1 }}>
                            {s}
                          </button>
                        ))}
                      </div>
                      <div style={{ fontSize:11, color:"var(--text-muted)" }}>{new Date(order.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                    </div>

                    {/* Expanded detail */}
                    {isSelected && (
                      <div style={{ marginTop:16, paddingTop:16, borderTop:"1px solid var(--border)" }}>
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:8, marginBottom:14 }}>
                          {[["Pastor",order.pastor_name],["Church",order.church_name],["Region",order.region],["Country",order.country],["Phone",order.phone],["WhatsApp",order.whatsapp],["Email",order.email]].filter(([,v])=>v).map(([k,v]) => (
                            <div key={k} style={{ padding:"8px 11px", background:"var(--surface2)", borderRadius:9, border:"1px solid var(--border)" }}>
                              <div style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:2 }}>{k}</div>
                              <div style={{ fontSize:13, fontWeight:500 }}>{v}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em", marginBottom:8 }}>Items</div>
                        <div style={{ background:"var(--surface2)", borderRadius:10, border:"1px solid var(--border)", overflow:"hidden", marginBottom: order.notes?14:0 }}>
                          {items.map((item, i) => (
                            <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"9px 14px", borderBottom: i<items.length-1?"1px solid var(--border)":"none", fontSize:14 }}>
                              <span style={{ fontWeight:500 }}>{item.name}</span>
                              <span style={{ color:"var(--text-muted)", fontWeight:600 }}>×{item.qty}</span>
                            </div>
                          ))}
                        </div>
                        {order.notes && <div style={{ padding:"10px 13px", background:"var(--surface2)", borderRadius:9, fontSize:13, color:"var(--text-secondary)", border:"1px solid var(--border)" }}><strong>Notes:</strong> {order.notes}</div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Inventory management modal */}
          {showInventory && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:400, padding:16 }} onClick={() => setShowInventory(false)}>
              <div style={{ background:"var(--surface)", borderRadius:20, padding:26, maxWidth:480, width:"100%", boxShadow:"var(--shadow-lg)", maxHeight:"85vh", overflowY:"auto" }} onClick={e => e.stopPropagation()}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 }}>
                  <div style={{ fontSize:17, fontWeight:700 }}>Manage Inventory</div>
                  <button onClick={() => setShowInventory(false)} style={{ border:"none", background:"var(--surface3)", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:13, color:"var(--text-muted)" }}>✕</button>
                </div>
                {/* Add new item */}
                <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
                  <input type="text" placeholder="Item name" value={newItemName} onChange={e => setNewItemName(e.target.value)} onKeyDown={e => e.key==="Enter" && addInventoryItem()} style={{ flex:2, minWidth:150, fontSize:14, padding:"9px 13px" }} />
                  <input type="text" placeholder="Category" value={newItemCat} onChange={e => setNewItemCat(e.target.value)} style={{ flex:1, minWidth:100, fontSize:14, padding:"9px 13px" }} />
                  <button onClick={addInventoryItem} disabled={!newItemName.trim()} className="btn-next" style={{ flex:"none", padding:"9px 16px", fontSize:13 }}>+ Add</button>
                </div>
                {/* Items list grouped by category */}
                {Object.entries(inventory.reduce((acc, i) => { (acc[i.category||"General"]||=[]).push(i); return acc; }, {})).map(([cat, items]) => (
                  <div key={cat} style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em", marginBottom:8, paddingBottom:6, borderBottom:"1px solid var(--border)" }}>{cat}</div>
                    {items.map(item => (
                      <div key={item.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 4px", borderBottom:"1px solid var(--border)" }}>
                        <span style={{ fontSize:14 }}>{item.name}</span>
                        <button onClick={() => removeInvItem(item.id)} style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:7, padding:"4px 10px", fontSize:12, cursor:"pointer", fontWeight:600 }}>Remove</button>
                      </div>
                    ))}
                  </div>
                ))}
                {inventory.length === 0 && <div style={{ fontSize:14, color:"var(--text-muted)", textAlign:"center", padding:"20px 0" }}>No inventory items yet.</div>}
              </div>
            </div>
          )}
        </div>
      );
    }

    function Portal({ onClose, rssLink, onRssUpdate }) {
      const [user, setUser]           = useState(() => {
        try { const s = localStorage.getItem("ea_admin_user"); return s ? JSON.parse(s) : null; } catch(e) { return null; }
      });
      const [tab, setTab]             = useState(() => localStorage.getItem("ea_admin_tab") || "results");
      const [menuOpen, setMenuOpen]   = useState(false);
      const [churches, setChurches]   = useState(CHURCHES);
      const [orderChurch, setOrderChurch] = useState(null);

      // Load persisted overrides from Supabase and merge into church data
      React.useEffect(() => {
        const timer = setTimeout(() => {
          loadChurchOverrides().then(overrides => {
            if (!overrides.length) return;
            setChurches(cs => {
              const existingIds = new Set(cs.map(c => c.id));

              // Merge overrides — only apply non-null values so we never erase hardcoded data
              const merged = cs.map(c => {
                const ov = overrides.find(o => Number(o.church_id) === c.id);
                if (!ov) return c;
                // Only pick fields that have actual values in the override
                const clean = {};
                Object.entries(ov).forEach(([k,v]) => {
                  if (v !== null && v !== undefined && v !== "" && k !== "church_id" && k !== "updated_at") {
                    clean[k] = v;
                  }
                });
                return { ...c, ...clean, distKampala: clean.dist_kampala || c.distKampala };
              });

              // Add brand new churches from Supabase that aren't in the hardcoded array
              const newChurches = overrides
                .filter(o => !existingIds.has(Number(o.church_id)) && o.pastor)
                .map(o => ({
                  id:           Number(o.church_id),
                  pastor:       o.pastor       || "",
                  church_name:  o.church_name  || "",
                  location:     o.location     || "",
                  region:       o.region       || "",
                  country:      o.country      || "",
                  members:      o.members      || 0,
                  standing:     o.standing     || "Stable",
                  language:     o.language     || "",
                  phone:        o.phone        || "",
                  whatsapp:     o.whatsapp     || "",
                  email:        o.email        || "",
                  internet:     o.internet     || "",
                  priority:     o.priority     || 0,
                  deploy_order: o.deploy_order || null,
                  distKampala:  o.dist_kampala || "",
                  lat:          o.lat          || 0,
                  lng:          o.lng          || 0,
                }));

              return [...merged, ...newChurches];
            });
          });
        }, 500);
        return () => clearTimeout(timer);
      }, []);

      // Update church locally and persist override to Supabase
      const updateChurch = (updated) => {
        // Handle delete
        if (updated._delete) {
          setChurches(cs => cs.filter(c => c.id !== updated.id));
          // Remove from Supabase
          fetch(`${SUPABASE_URL}/rest/v1/church_overrides?church_id=eq.${updated.id}`, {
            method: "DELETE",
            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
          }).catch(e => console.warn("delete church override:", e));
          return;
        }
        setChurches(cs => cs.map(c => c.id === updated.id ? { ...c, ...updated } : c));
        // If location changed and no coords, geocode
        if ((!updated.lat || updated.lat === 0) && (updated.location || updated.region)) {
          geocode(updated).then(coords => {
            if (coords.lat !== 0) setChurches(cs => cs.map(c => c.id === updated.id ? {...c, ...coords} : c));
            saveChurchOverride(updated.id, {
              deploy_order: updated.deploy_order||null, standing: updated.standing||null,
              spiritual_standing: updated.spiritual_standing||null, language: updated.language||null,
              members: updated.members||null, priority: updated.priority||null,
              bldg_type: updated.bldg_type||null, internet: updated.internet||null,
              cell_signal: updated.cell_signal||null, cell_quality: updated.cell_quality||null,
              cell_phone: updated.cell_phone||null, tablet: updated.tablet||null,
              elect_power: updated.elect_power||null, laptop: updated.laptop||null,
              sound_system: updated.sound_system||null, tv_screen: updated.tv_screen||null,
              dist_kampala: updated.distKampala||null, phone: updated.phone||null,
              whatsapp: updated.whatsapp||null, email: updated.email||null,
              church_name: updated.church_name||null, pastor: updated.pastor||null,
              location: updated.location||null, region: updated.region||null,
              country: updated.country||null,
              lat: coords.lat || updated.lat || null,
              lng: coords.lng || updated.lng || null,
            });
          });
        } else {
          saveChurchOverride(updated.id, {
            deploy_order: updated.deploy_order||null, standing: updated.standing||null,
            spiritual_standing: updated.spiritual_standing||null, language: updated.language||null,
            members: updated.members||null, priority: updated.priority||null,
            bldg_type: updated.bldg_type||null, internet: updated.internet||null,
            cell_signal: updated.cell_signal||null, cell_quality: updated.cell_quality||null,
            cell_phone: updated.cell_phone||null, tablet: updated.tablet||null,
            elect_power: updated.elect_power||null, laptop: updated.laptop||null,
            sound_system: updated.sound_system||null, tv_screen: updated.tv_screen||null,
            dist_kampala: updated.distKampala||null, phone: updated.phone||null,
            whatsapp: updated.whatsapp||null, email: updated.email||null,
            church_name: updated.church_name||null, pastor: updated.pastor||null,
            location: updated.location||null, region: updated.region||null,
            country: updated.country||null,
            lat: updated.lat||null, lng: updated.lng||null,
          });
        }
      };

      const TABS = [
        ["results",  "Results"],
        ["churches", "Churches"],
        ["orders",   "Orders"],
        ["map",      "Map"],
        ["users",    "Users"],
        ["settings", "Settings"],
      ];

      const login = (u) => {
        localStorage.setItem("ea_admin_user", JSON.stringify(u));
        setUser(u); setTab("results");
      };
      const logout = () => {
        localStorage.removeItem("ea_admin_user");
        localStorage.removeItem("ea_admin_tab");
        setUser(null);
      };
      const switchTab = (t) => {
        localStorage.setItem("ea_admin_tab", t);
        setTab(t); setMenuOpen(false);
      };

      if (!user) return (
        <div className="app">
          <nav className="nav">
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title" style={{ fontSize:12 }}>East Africa · Admin</span></div>
            <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:500, cursor:"pointer" }}>← Back</button>
          </nav>
          <PortalLogin onLogin={login} />
        </div>
      );

      return (
        <div className="app">
          {/* Nav */}
          <nav className="nav" style={{ gap:8 }}>
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title" style={{ fontSize:12 }}>East Africa · Admin</span></div>

            {/* Desktop tabs */}
            <div className="portal-desktop-tabs" style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ display:"flex", gap:2, background:"var(--surface3)", borderRadius:9, padding:3 }}>
                {TABS.map(([key,label]) => (
                  <button key={key} onClick={() => switchTab(key)} className={`nav-tab${tab===key?" active":""}`}>{label}</button>
                ))}
              </div>
              <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:500, cursor:"pointer", whiteSpace:"nowrap" }}>← Survey</button>
              <button onClick={logout} style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Out</button>
            </div>

            {/* Mobile hamburger */}
            <div className="portal-mobile-tabs" style={{ display:"none", alignItems:"center", gap:8 }}>
              <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:500, cursor:"pointer" }}>← Back</button>
              <button onClick={() => setMenuOpen(m=>!m)} style={{ border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:600, cursor:"pointer", color:"var(--text-secondary)" }}>
                {TABS.find(t=>t[0]===tab)?.[1]} ▾
              </button>
              <button onClick={logout} style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:600, cursor:"pointer" }}>Out</button>
            </div>
          </nav>

          {/* Mobile dropdown menu */}
          {menuOpen && (
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:14, margin:"8px 16px", padding:6, boxShadow:"var(--shadow-md)", position:"relative", zIndex:50 }}>
              {TABS.map(([key,label]) => (
                <button key={key} onClick={() => switchTab(key)}
                  style={{ display:"block", width:"100%", textAlign:"left", padding:"11px 14px", border:"none", background: tab===key?"var(--accent-light)":"transparent", borderRadius:10, fontSize:14, fontWeight: tab===key?600:400, color: tab===key?"var(--accent)":"var(--text)", cursor:"pointer", marginBottom:2 }}>
                  {label}
                </button>
              ))}
            </div>
          )}

          <div style={{ flex:1, overflowX:"hidden" }}>
            {tab==="results"  && <SurveyResults />}
            {tab==="churches" && <ChurchDatabase churches={churches} onPlaceOrder={c => setOrderChurch(c)} onAdd={async c => {
              const newId = 900000 + Math.floor(Math.random() * 99999);
              const newChurch = {...c, id:newId, lat:0, lng:0};
              setChurches(cs=>[...cs, newChurch]);
              // Geocode location → get coordinates automatically
              const coords = await geocode(newChurch);
              const withCoords = { ...newChurch, ...coords };
              if (coords.lat !== 0) setChurches(cs => cs.map(ch => ch.id === newId ? withCoords : ch));
              // Persist to Supabase
              saveChurchOverride(newId, {
                deploy_order:       c.deploy_order || null,
                standing:           c.standing || "Stable",
                spiritual_standing: c.spiritual_standing || null,
                language:           c.language || null,
                members:            c.members || null,
                priority:           c.priority || null,
                bldg_type:          c.bldg_type || null,
                internet:           c.internet || null,
                cell_signal:        c.cell_signal || null,
                cell_quality:       c.cell_quality || null,
                cell_phone:         c.cell_phone || null,
                tablet:             c.tablet || null,
                elect_power:        c.elect_power || null,
                laptop:             c.laptop || null,
                sound_system:       c.sound_system || null,
                tv_screen:          c.tv_screen || null,
                dist_kampala:       c.distKampala || null,
                phone:              c.phone || null,
                whatsapp:           c.whatsapp || null,
                email:              c.email || null,
                church_name:        c.church_name || null,
                pastor:             c.pastor || null,
                location:           c.location || null,
                region:             c.region || null,
                country:            c.country || null,
                lat:                coords.lat || null,
                lng:                coords.lng || null,
              });
            }} onUpdate={updateChurch} />}
            {tab==="orders"   && <OrdersTab />}
            {tab==="map"      && <ChurchMap churches={churches} />}
            {tab==="users"    && <AdminUsers />}
            {tab==="settings" && <PortalSettings rssLink={rssLink} onRssUpdate={onRssUpdate} />}
          </div>

          {/* Place Order Modal */}
          {orderChurch && (
            <PlaceOrderModal
              church={orderChurch}
              onClose={() => setOrderChurch(null)}
              onOrderPlaced={() => {}}
            />
          )}
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState(() => {
        try { return localStorage.getItem("ea_view") || "survey"; } catch(e) { return "survey"; }
      });
      const [rssLink, setRssLink] = useState(DEFAULT_RSS);

      const switchView = (v) => {
        try { localStorage.setItem("ea_view", v); } catch(e) {}
        setView(v);
      };

      React.useEffect(() => {
        loadSettings().then(() => setRssLink(LIVE_RSS_LINK));
      }, []);

      if (view === "portal") return <Portal onClose={() => switchView("survey")} rssLink={rssLink} onRssUpdate={link => { LIVE_RSS_LINK = link; setRssLink(link); }} />;
      return (
        <div className="app">
          <nav className="nav">
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title">East Africa Audio Survey</span></div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div className="nav-tabs">
                <button className={`nav-tab${view==="survey"?" active":""}`} onClick={() => switchView("survey")}>Survey</button>
                <button className={`nav-tab${view==="dashboard"?" active":""}`} onClick={() => switchView("dashboard")}>Dashboard</button>
              </div>
              <button onClick={() => switchView("portal")} style={{ display:"flex", alignItems:"center", gap:5, border:"1px solid var(--border-strong)", background:"var(--surface)", color:"var(--text-secondary)", borderRadius:8, padding:"5px 11px", fontSize:13, fontWeight:600, cursor:"pointer", transition:"all 0.15s", letterSpacing:"-0.01em", whiteSpace:"nowrap" }}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span className="portal-btn-label">Portal</span>
              </button>
            </div>
          </nav>
          <div className="survey-wrap">
            {view === "survey" ? <SurveyWizard /> : <Dashboard />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
