    // ─── Survey Results (Admin) ────────────────────────────────────────────────
    function SurveyResults() {
      const [responses, setResponses] = useState(null);
      const [selected, setSelected]   = useState(null);
      const [error, setError]         = useState(false);
      const [refreshing, setRefreshing] = useState(false);
      const [lastRefresh, setLastRefresh] = useState(null);

      const fetchData = (showSpinner = false) => {
        if (showSpinner) setRefreshing(true);
        fetch(`${SUPABASE_URL}/rest/v1/survey_responses?select=*&order=created_at.desc`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        })
          .then(r => r.json())
          .then(rows => {
            setResponses(Array.isArray(rows) ? rows : []);
            setLastRefresh(new Date());
            setError(false);
          })
          .catch(() => setError(true))
          .finally(() => setRefreshing(false));
      };

      // Initial load + auto-refresh every 60 seconds
      React.useEffect(() => {
        fetchData();
        const interval = setInterval(() => fetchData(), 60000);
        return () => clearInterval(interval);
      }, []);

      const ratingColor = r => r==="Very smooth"||r==="Mostly smooth" ? "tag-green" : r==="Some issues" ? "tag-warn" : r==="Difficult" ? "tag-red" : "tag-gray";

      if (error) return (
        <div style={{ padding:"60px 24px", textAlign:"center" }}>
          <div style={{ fontSize:14, color:"var(--danger)" }}>Could not load responses. Check Supabase connection.</div>
        </div>
      );
      if (!responses) return (
        <div style={{ padding:"60px 24px", textAlign:"center" }}>
          <div style={{ fontSize:14, color:"var(--text-muted)" }}>Loading responses…</div>
        </div>
      );

      return (
        <div style={{ padding:"24px 16px", maxWidth:1080, margin:"0 auto", width:"100%" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20, flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.025em" }}>Survey Results</div>
              <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:3 }}>
                {responses ? `${responses.length} submission${responses.length!==1?"s":""} from the field` : "Loading…"}
                {lastRefresh && <span style={{ marginLeft:8, color:"var(--text-placeholder)" }}>· Updated {lastRefresh.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}</span>}
              </div>
            </div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
              {/* Refresh button */}
              <button onClick={() => fetchData(true)} disabled={refreshing || !responses}
                style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:10, fontSize:13, fontWeight:500, cursor:"pointer", color:"var(--text-secondary)", transition:"all 0.15s" }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ animation: refreshing?"spin 0.8s linear infinite":"none" }}>
                  <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                {refreshing ? "Refreshing…" : "Refresh"}
              </button>
              {responses && responses.length > 0 && [
                ["Total", responses.length, "var(--accent)"],
                ["Smooth", responses.filter(r=>r.overall_rating==="Very smooth"||r.overall_rating==="Mostly smooth").length, "var(--success)"],
                ["Issues", responses.filter(r=>r.overall_rating==="Some issues"||r.overall_rating==="Difficult").length, "var(--warn)"],
              ].map(([label, val, color]) => (
                <div key={label} style={{ padding:"8px 14px", background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, boxShadow:"var(--shadow-sm)", textAlign:"center" }}>
                  <div style={{ fontSize:18, fontWeight:700, color, lineHeight:1 }}>{val}</div>
                  <div style={{ fontSize:11, color:"var(--text-muted)", marginTop:3 }}>{label}</div>
                </div>
              ))}
            </div>
          </div>

          {responses.length === 0 ? (
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:"60px 24px", textAlign:"center", boxShadow:"var(--shadow-sm)" }}>
              <div style={{ fontSize:16, fontWeight:600, color:"var(--text)", marginBottom:8 }}>No submissions yet</div>
              <div style={{ fontSize:14, color:"var(--text-muted)" }}>Share the survey link to start collecting results.</div>
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {responses.map((r, i) => (
                <div key={r.id||i} onClick={() => setSelected(selected?.id===r.id?null:r)}
                  style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:14, padding:"16px 18px", boxShadow:"var(--shadow-sm)", cursor:"pointer", transition:"box-shadow 0.15s" }}>
                  {/* Row header */}
                  <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                    <div style={{ width:34, height:34, borderRadius:"50%", background:"rgba(0,122,255,0.09)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"var(--accent)", flexShrink:0 }}>
                      {(r.name||"?").charAt(0).toUpperCase()}
                    </div>
                    <div style={{ flex:1, minWidth:120 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"var(--text)" }}>{r.name||"Unknown"}</div>
                      <div style={{ fontSize:12, color:"var(--text-muted)" }}>{r.church_name||""}{r.church_name&&r.country?" · ":""}{r.country||""}{r.region?` · ${r.region}`:""}</div>
                    </div>
                    <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                      {r.overall_rating && <span className={`tag ${ratingColor(r.overall_rating)}`}>{r.overall_rating}</span>}
                      {r.network_type && <span className="tag tag-gray">{r.network_type}</span>}
                      {r.avg_start_time!=null && <span style={{ fontSize:12, fontWeight:600, color: r.avg_start_time>10?"var(--warn)":"var(--accent)" }}>{Number(r.avg_start_time).toFixed(1)}s</span>}
                      <div style={{ fontSize:11, color:"var(--text-muted)" }}>{r.created_at?new Date(r.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</div>
                    </div>
                  </div>

                  {/* Expanded detail */}
                  {selected?.id===r.id && (
                    <div style={{ marginTop:16, paddingTop:16, borderTop:"1px solid var(--border)" }}>
                      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))", gap:8, marginBottom:12 }}>
                        {[
                          ["Device", r.device_type],
                          ["Connection", r.connection_type],
                          ["Network", r.network_type],
                          ["YouTube", r.youtube_ability],
                          ["WhatsApp", r.on_whatsapp==="Yes" ? (r.whatsapp_contact||"Yes") : r.on_whatsapp||null],
                          ["Email", r.email],
                          ["App Installed", r.app_installed],
                          ["RSS Loaded", r.rss_loaded],
                          ["Avg Start", r.avg_start_time!=null?`${Number(r.avg_start_time).toFixed(1)}s`:"—"],
                          ["Buffering", r.buffering_count!=null?`${r.buffering_count}x`:"—"],
                          ["Smooth", r.smooth_count!=null?`${r.smooth_count}/2`:"—"],
                          ["Consistent", r.consistent],
                          ["Easy", r.easy],
                          ["Errors", r.errors],
                          ["Location", r.location],
                          ["Priority", r.priority||"—"],
                        ].filter(([,v])=>v).map(([k,v]) => (
                          <div key={k} style={{ padding:"9px 11px", background:"var(--surface2)", borderRadius:9, border:"1px solid var(--border)" }}>
                            <div style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:3 }}>{k}</div>
                            <div style={{ fontSize:13, fontWeight:500, color:"var(--text)" }}>{v}</div>
                          </div>
                        ))}
                      </div>
                      {(r.comments||r.error_notes||r.consistency_notes) && (
                        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                          {r.error_notes && <div style={{ padding:"10px 13px", background:"var(--danger-light)", borderRadius:9, fontSize:13, color:"#b02520", border:"1px solid rgba(255,59,48,0.15)" }}><strong>Error:</strong> {r.error_notes}</div>}
                          {r.consistency_notes && <div style={{ padding:"10px 13px", background:"var(--warn-light)", borderRadius:9, fontSize:13, color:"#8a5200" }}><strong>Differences:</strong> {r.consistency_notes}</div>}
                          {r.comments && <div style={{ padding:"10px 13px", background:"var(--surface2)", borderRadius:9, fontSize:13, color:"var(--text-secondary)", border:"1px solid var(--border)" }}><strong>Comments:</strong> {r.comments}</div>}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Portal Settings ───────────────────────────────────────────────────────
    function PortalSettings({ rssLink, onRssUpdate }) {
      const [link, setLink]     = useState(rssLink);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved]   = useState(false);
      const [error, setError]   = useState("");

      React.useEffect(() => { setLink(rssLink); }, [rssLink]);

      const save = async () => {
        if (!link.trim()) { setError("Link cannot be empty."); return; }
        if (!link.startsWith("http")) { setError("Link must start with http or https."); return; }
        setSaving(true); setError("");
        try {
          await saveSetting("rss_link", link.trim());
          onRssUpdate(link.trim());
          setSaved(true);
          setTimeout(() => setSaved(false), 3000);
        } catch(e) {
          setError("Failed to save. Check your connection.");
        }
        setSaving(false);
      };

      return (
        <div style={{ padding:"28px 20px", maxWidth:600, margin:"0 auto", width:"100%" }}>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.025em" }}>Settings</div>
            <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:3 }}>Manage the audio link sent to survey testers</div>
          </div>

          {/* RSS Link card */}
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:24, boxShadow:"var(--shadow-sm)", marginBottom:16 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
              <div style={{ width:36, height:36, borderRadius:10, background:"rgba(0,122,255,0.09)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <SvgIcon name="link" size={16} color="var(--accent)" />
              </div>
              <div>
                <div style={{ fontSize:15, fontWeight:700, letterSpacing:"-0.02em" }}>Podcast RSS Link</div>
                <div style={{ fontSize:12, color:"var(--text-muted)" }}>This is the link testers paste into their podcast app</div>
              </div>
            </div>

            <div className="field-group" style={{ marginBottom:12 }}>
              <div className="field-label">Current Link</div>
              <textarea
                value={link}
                onChange={e => { setLink(e.target.value); setError(""); setSaved(false); }}
                style={{ minHeight:90, fontSize:13, fontFamily:"monospace", letterSpacing:0, wordBreak:"break-all" }}
                placeholder="https://..."
              />
            </div>

            {error && (
              <div className="info-box danger" style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:12 }}>
                <SvgIcon name="alertCircle" size={15} color="#b02520" /><span>{error}</span>
              </div>
            )}

            {saved && (
              <div className="info-box green" style={{ display:"flex", gap:8, alignItems:"center", marginBottom:12 }}>
                <SvgIcon name="checkCircle" size={15} color="#1a7a3a" /><span>Link saved — survey will now use the updated URL.</span>
              </div>
            )}

            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              <button className="btn-next" onClick={save} disabled={saving || link === rssLink} style={{ flex:"none", padding:"11px 22px" }}>
                {saving ? "Saving…" : saved ? "✓ Saved" : "Save Link"}
              </button>
              {link !== rssLink && (
                <button className="btn-back" onClick={() => { setLink(rssLink); setError(""); }} style={{ flex:"none" }}>
                  Reset
                </button>
              )}
            </div>
          </div>

          {/* Preview */}
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:20, boxShadow:"var(--shadow-sm)" }}>
            <div style={{ fontSize:13, fontWeight:600, color:"var(--text-secondary)", marginBottom:10 }}>Preview — how testers will see it</div>
            <RSSCopyBox link={link} />
            <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:8 }}>Testers tap this box to copy the link during the survey setup step.</div>
          </div>
        </div>
      );
    }

    // ─── Portal Shell ──────────────────────────────────────────────────────────
    function Portal({ onClose, rssLink, onRssUpdate }) {
      const [user, setUser]           = useState(() => {
        try { const s = localStorage.getItem("ea_admin_user"); return s ? JSON.parse(s) : null; } catch(e) { return null; }
      });
      const [tab, setTab]             = useState(() => localStorage.getItem("ea_admin_tab") || "results");
      const [menuOpen, setMenuOpen]   = useState(false);
      const [churches, setChurches]   = useState(CHURCHES);

      const TABS = [
        ["results",  "Results"],
        ["churches", "Churches"],
        ["map",      "Map"],
        ["users",    "Users"],
        ["settings", "Settings"],
      ];

      const login = (u) => {
        localStorage.setItem("ea_admin_user", JSON.stringify(u));
        setUser(u); setTab("results");
      };
      const logout = () => {
        localStorage.removeItem("ea_admin_user");
        localStorage.removeItem("ea_admin_tab");
        setUser(null);
      };
      const switchTab = (t) => {
        localStorage.setItem("ea_admin_tab", t);
        setTab(t); setMenuOpen(false);
      };

      if (!user) return (
        <div className="app">
          <nav className="nav">
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title" style={{ fontSize:12 }}>East Africa · Admin</span></div>
            <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:500, cursor:"pointer" }}>← Back</button>
          </nav>
          <PortalLogin onLogin={login} />
        </div>
      );

      return (
        <div className="app">
          {/* Nav */}
          <nav className="nav" style={{ gap:8 }}>
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title" style={{ fontSize:12 }}>East Africa · Admin</span></div>

            {/* Desktop tabs */}
            <div className="portal-desktop-tabs" style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ display:"flex", gap:2, background:"var(--surface3)", borderRadius:9, padding:3 }}>
                {TABS.map(([key,label]) => (
                  <button key={key} onClick={() => switchTab(key)} className={`nav-tab${tab===key?" active":""}`}>{label}</button>
                ))}
              </div>
              <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:500, cursor:"pointer", whiteSpace:"nowrap" }}>← Survey</button>
              <button onClick={logout} style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Out</button>
            </div>

            {/* Mobile hamburger */}
            <div className="portal-mobile-tabs" style={{ display:"none", alignItems:"center", gap:8 }}>
              <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:500, cursor:"pointer" }}>← Back</button>
              <button onClick={() => setMenuOpen(m=>!m)} style={{ border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:600, cursor:"pointer", color:"var(--text-secondary)" }}>
                {TABS.find(t=>t[0]===tab)?.[1]} ▾
              </button>
              <button onClick={logout} style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:600, cursor:"pointer" }}>Out</button>
            </div>
          </nav>

          {/* Mobile dropdown menu */}
          {menuOpen && (
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:14, margin:"8px 16px", padding:6, boxShadow:"var(--shadow-md)", position:"relative", zIndex:50 }}>
              {TABS.map(([key,label]) => (
                <button key={key} onClick={() => switchTab(key)}
                  style={{ display:"block", width:"100%", textAlign:"left", padding:"11px 14px", border:"none", background: tab===key?"var(--accent-light)":"transparent", borderRadius:10, fontSize:14, fontWeight: tab===key?600:400, color: tab===key?"var(--accent)":"var(--text)", cursor:"pointer", marginBottom:2 }}>
                  {label}
                </button>
              ))}
            </div>
          )}

          <div style={{ flex:1, overflowX:"hidden" }}>
            {tab==="results"  && <SurveyResults />}
            {tab==="churches" && <ChurchDatabase churches={churches} onAdd={c => setChurches(cs=>[...cs,{...c,id:Date.now(),lat:0,lng:0}])} onUpdate={updated => setChurches(cs=>cs.map(c=>c.id===updated.id?{...c,...updated}:c))} />}
            {tab==="map"      && <ChurchMap churches={churches} />}
            {tab==="users"    && <AdminUsers />}
            {tab==="settings" && <PortalSettings rssLink={rssLink} onRssUpdate={onRssUpdate} />}
          </div>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState(() => {
        try { return localStorage.getItem("ea_view") || "survey"; } catch(e) { return "survey"; }
      });
      const [rssLink, setRssLink] = useState(DEFAULT_RSS);

      const switchView = (v) => {
        try { localStorage.setItem("ea_view", v); } catch(e) {}
        setView(v);
      };

      React.useEffect(() => {
        loadSettings().then(() => setRssLink(LIVE_RSS_LINK));
      }, []);

      if (view === "portal") return <Portal onClose={() => switchView("survey")} rssLink={rssLink} onRssUpdate={link => { LIVE_RSS_LINK = link; setRssLink(link); }} />;
      return (
        <div className="app">
          <nav className="nav">
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title">East Africa Audio Survey</span></div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div className="nav-tabs">
                <button className={`nav-tab${view==="survey"?" active":""}`} onClick={() => switchView("survey")}>Survey</button>
                <button className={`nav-tab${view==="dashboard"?" active":""}`} onClick={() => switchView("dashboard")}>Dashboard</button>
              </div>
              <button onClick={() => switchView("portal")} style={{ display:"flex", alignItems:"center", gap:5, border:"1px solid var(--border-strong)", background:"var(--surface)", color:"var(--text-secondary)", borderRadius:8, padding:"5px 11px", fontSize:13, fontWeight:600, cursor:"pointer", transition:"all 0.15s", letterSpacing:"-0.01em", whiteSpace:"nowrap" }}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span className="portal-btn-label">Portal</span>
              </button>
            </div>
          </nav>
          <div className="survey-wrap">
            {view === "survey" ? <SurveyWizard /> : <Dashboard />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
