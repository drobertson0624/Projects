    // ─── Church Map (Leaflet) ────────────────────────────────────────────────
    function ChurchMap({ churches }) {
      const mapRef      = React.useRef(null);
      const leafletMap  = React.useRef(null);
      const markersRef  = React.useRef([]);
      const rallyLayerRef = React.useRef([]);
      const [viewMode, setViewMode] = useState("map");
      const [mapReady, setMapReady] = useState(false);

      // Rally points state — load from Supabase, fall back to defaults
      const [rallyPoints, setRallyPoints] = useState([
        { id:"default-bomet",  name:"Bomet",  lat:-0.7820, lng:35.3420, radiusMiles:50, color:"#87CEEB" },
        { id:"default-nakuru", name:"Nakuru", lat:-0.3031, lng:36.0800, radiusMiles:50, color:"#9B59B6" },
      ]);
      const [rallyLoaded, setRallyLoaded] = useState(false);

      // Load from Supabase once
      React.useEffect(() => {
        fetchRallyPoints().then(rows => {
          if (rows) setRallyPoints(rows);
          setRallyLoaded(true);
        });
      }, []);
      const [showRallyPanel, setShowRallyPanel] = useState(false);
      const [editingRally, setEditingRally]     = useState(null);
      const [newRally, setNewRally]             = useState({ name:"", city:"", country:"Kenya", radiusMiles:50, color:"#87CEEB" });
      const [showAddRally, setShowAddRally]     = useState(false);
      const [rallyGeocoding, setRallyGeocoding] = useState(false);
      const [rallyGeoError, setRallyGeoError]   = useState("");

      const MILES_TO_METERS = 1609.34;
      const RALLY_COLORS = ["#87CEEB","#9B59B6","#E74C3C","#27AE60","#F39C12","#1ABC9C","#2980B9","#E91E63"];

      const byRegion = {};
      churches.forEach(c => {
        if (!byRegion[c.region]) byRegion[c.region] = { count:0, members:0, churches:[] };
        byRegion[c.region].count++;
        byRegion[c.region].members += c.members||0;
        byRegion[c.region].churches.push(c);
      });

      const sCol = s => s==="STRONG"?"#34C759":s==="Growing"?"#FF9500":"#007AFF";

      // Add CSS for pulse animation once
      React.useEffect(() => {
        if (!document.getElementById('rally-pulse-css')) {
          const style = document.createElement('style');
          style.id = 'rally-pulse-css';
          style.textContent = `
            @keyframes rallyPulse {
              0%   { transform:scale(1);   opacity:0.8; }
              50%  { transform:scale(1.6); opacity:0.3; }
              100% { transform:scale(1);   opacity:0.8; }
            }
            .rally-beacon { animation: rallyPulse 2s ease-in-out infinite; }
            .rally-beacon-2 { animation: rallyPulse 2s ease-in-out infinite 0.6s; }
            .rally-beacon-3 { animation: rallyPulse 2s ease-in-out infinite 1.2s; }
          `;
          document.head.appendChild(style);
        }
      }, []);

      // Draw rally points on the map
      const drawRallyPoints = React.useCallback((map) => {
        // Clear existing rally layers
        rallyLayerRef.current.forEach(l => { try { map.removeLayer(l); } catch(e) {} });
        rallyLayerRef.current = [];

        rallyPoints.forEach(rp => {
          // Radius circle
          const circle = window.L.circle([rp.lat, rp.lng], {
            radius: rp.radiusMiles * MILES_TO_METERS,
            color: rp.color,
            fillColor: rp.color,
            fillOpacity: 0.07,
            weight: 2,
            dashArray: "6 4",
          });
          circle.addTo(map);
          rallyLayerRef.current.push(circle);

          // Pulsing beacon icon
          const beacon = window.L.divIcon({
            className: '',
            html: `<div style="position:relative;width:40px;height:40px;transform:translate(-50%,-50%)">
              <div class="rally-beacon" style="position:absolute;inset:0;border-radius:50%;background:${rp.color};opacity:0.25;"></div>
              <div class="rally-beacon-2" style="position:absolute;inset:6px;border-radius:50%;background:${rp.color};opacity:0.35;"></div>
              <div style="position:absolute;inset:12px;border-radius:50%;background:${rp.color};box-shadow:0 0 12px ${rp.color}88;display:flex;align-items:center;justify-content:center;">
                <div style="width:6px;height:6px;border-radius:50%;background:white;"></div>
              </div>
            </div>`,
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, -24],
          });

          const marker = window.L.marker([rp.lat, rp.lng], { icon: beacon });
          marker.bindPopup(`
            <div style="font-family:-apple-system,sans-serif;min-width:180px;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                <div style="width:10px;height:10px;border-radius:50%;background:${rp.color};flex-shrink:0;"></div>
                <div style="font-size:15px;font-weight:700;color:#1d1d1f;">Rally Point: ${rp.name}</div>
              </div>
              <div style="padding:8px;background:#f7f7f7;border-radius:8px;font-size:13px;color:#444;">
                <div style="margin-bottom:4px;"><strong>Radius:</strong> ${rp.radiusMiles} miles</div>
                <div><strong>Coords:</strong> ${rp.lat.toFixed(4)}, ${rp.lng.toFixed(4)}</div>
              </div>
            </div>
          `, { maxWidth: 220 });
          marker.addTo(map);
          rallyLayerRef.current.push(marker);
        });
      }, [rallyPoints]);

      React.useEffect(() => {
        if (viewMode !== "map") return;
        if (!window.L) { setMapReady(false); return; }

        setTimeout(() => {
          if (!mapRef.current) return;
          if (leafletMap.current) { leafletMap.current.remove(); leafletMap.current = null; }

          const map = window.L.map(mapRef.current, { center:[0.5, 33.5], zoom:7, zoomControl:true, scrollWheelZoom:true });
          leafletMap.current = map;

          const street    = window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:18 });
          const satellite = window.L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:18 });
          const terrain   = window.L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution:'© OpenTopoMap', maxZoom:17 });
          street.addTo(map);
          window.L.control.layers({ "Street":street, "Satellite":satellite, "Terrain":terrain }, {}, { position:'topright' }).addTo(map);

          // Church pins
          markersRef.current.forEach(m => map.removeLayer(m));
          markersRef.current = [];
          churches.filter(c => c.lat && c.lng).forEach(c => {
            const col = sCol(c.standing);
            const r   = Math.max(8, Math.min(20, 8 + ((c.members||0)/220)*12));
            const icon = window.L.divIcon({
              className:'',
              html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${col};border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:${r>13?'9':'0'}px;font-weight:700;color:white;cursor:pointer;">${c.members>80?c.members:""}</div>`,
              iconSize:[r*2,r*2], iconAnchor:[r,r], popupAnchor:[0,-r-4],
            });
            const marker = window.L.marker([c.lat,c.lng], {icon});
            marker.bindPopup(`<div style="font-family:-apple-system,sans-serif;min-width:200px;"><div style="font-size:14px;font-weight:700;color:#1d1d1f;margin-bottom:4px;">${c.pastor}</div><div style="font-size:12px;color:#86868b;margin-bottom:10px;">${c.location}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;"><div style="padding:7px 9px;background:#f7f7f7;border-radius:7px;"><div style="font-size:10px;font-weight:600;color:#86868b;text-transform:uppercase;margin-bottom:2px;">Members</div><div style="font-size:14px;font-weight:700;color:#007AFF;">${c.members||"?"}</div></div><div style="padding:7px 9px;background:#f7f7f7;border-radius:7px;"><div style="font-size:10px;font-weight:600;color:#86868b;text-transform:uppercase;margin-bottom:2px;">Standing</div><div style="font-size:12px;font-weight:600;color:${col};">${c.standing||"—"}</div></div><div style="padding:7px 9px;background:#f7f7f7;border-radius:7px;"><div style="font-size:10px;font-weight:600;color:#86868b;text-transform:uppercase;margin-bottom:2px;">Region</div><div style="font-size:12px;font-weight:500;color:#1d1d1f;">${c.region}</div></div><div style="padding:7px 9px;background:#f7f7f7;border-radius:7px;"><div style="font-size:10px;font-weight:600;color:#86868b;text-transform:uppercase;margin-bottom:2px;">Country</div><div style="font-size:12px;font-weight:500;color:#1d1d1f;">${c.country}</div></div></div></div>`, {maxWidth:260});
            marker.addTo(map);
            markersRef.current.push(marker);
          });

          drawRallyPoints(map);
          setMapReady(true);
        }, 100);

        return () => { if (leafletMap.current) { leafletMap.current.remove(); leafletMap.current = null; } };
      }, [viewMode, churches]);

      // Redraw rally points when they change without rebuilding the whole map
      React.useEffect(() => {
        if (leafletMap.current && viewMode === "map") {
          drawRallyPoints(leafletMap.current);
        }
      }, [rallyPoints, drawRallyPoints]);

      const updateRally = (id, changes) => {
        setRallyPoints(pts => {
          const updated = pts.map(p => p.id===id ? {...p, ...changes} : p);
          const rp = updated.find(p => p.id===id);
          if (rp) upsertRallyPoint(rp);
          return updated;
        });
      };

      const updateRadius = (id, miles) => {
        updateRally(id, { radiusMiles: Math.max(10, Math.min(500, miles)) });
      };

      return (
        <div style={{ padding:"28px 24px", maxWidth:1080, margin:"0 auto", width:"100%" }}>
          {/* Header */}
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.025em" }}>Church Locations</div>
              <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:3 }}>{churches.length} churches · {rallyPoints.length} rally point{rallyPoints.length!==1?"s":""}</div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setShowRallyPanel(s=>!s)} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", border:`1px solid ${showRallyPanel?"var(--accent)":"var(--border-strong)"}`, background: showRallyPanel?"rgba(0,122,255,0.07)":"var(--surface)", borderRadius:9, fontSize:13, fontWeight:500, cursor:"pointer", color: showRallyPanel?"var(--accent)":"var(--text-secondary)", transition:"all 0.15s" }}>
                <span style={{ fontSize:14 }}>📡</span> Rally Points
              </button>
              <div style={{ display:"flex", gap:2, background:"var(--surface3)", borderRadius:9, padding:3 }}>
                {["map","region"].map(m => (
                  <button key={m} onClick={() => setViewMode(m)} style={{ padding:"5px 16px", borderRadius:7, border:"none", fontSize:13, fontWeight:500, cursor:"pointer", background:viewMode===m?"var(--surface)":"transparent", color:viewMode===m?"var(--text)":"var(--text-muted)", boxShadow:viewMode===m?"var(--shadow-sm)":"none", transition:"all 0.15s" }}>
                    {m==="map"?"Live Map":"By Region"}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Rally Points Panel */}
          {showRallyPanel && (
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:16, padding:20, marginBottom:16, boxShadow:"var(--shadow-sm)" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
                <div style={{ fontSize:15, fontWeight:700 }}>📡 Rally Points</div>
                <button onClick={() => setShowAddRally(true)} className="btn-next" style={{ flex:"none", padding:"7px 16px", fontSize:12 }}>+ Add Rally Point</button>
              </div>

              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {rallyPoints.map(rp => (
                  <div key={rp.id} style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 16px", background:"var(--surface2)", borderRadius:12, border:"1px solid var(--border)", flexWrap:"wrap" }}>
                    {/* Color dot + name */}
                    <div style={{ display:"flex", alignItems:"center", gap:10, minWidth:140 }}>
                      <div style={{ width:14, height:14, borderRadius:"50%", background:rp.color, boxShadow:`0 0 8px ${rp.color}66`, flexShrink:0 }} />
                      <div style={{ fontSize:14, fontWeight:700 }}>{rp.name}</div>
                    </div>

                    {/* Radius slider */}
                    <div style={{ flex:1, minWidth:200 }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                        <span style={{ fontSize:12, color:"var(--text-muted)" }}>Radius</span>
                        <span style={{ fontSize:13, fontWeight:700, color:rp.color }}>{rp.radiusMiles} mi</span>
                      </div>
                      <input type="range" min="10" max="300" step="5" value={rp.radiusMiles}
                        onChange={e => updateRadius(rp.id, Number(e.target.value))}
                        style={{ width:"100%", accentColor:rp.color, cursor:"pointer" }}
                      />
                      <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"var(--text-muted)" }}>
                        <span>10 mi</span><span>300 mi</span>
                      </div>
                    </div>

                    {/* Direct input */}
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <input type="number" min="10" max="500" value={rp.radiusMiles}
                        onChange={e => updateRadius(rp.id, Number(e.target.value))}
                        style={{ width:70, padding:"6px 10px", fontSize:13, fontWeight:600, textAlign:"center", border:"1px solid var(--border-strong)", borderRadius:8 }}
                      />
                      <span style={{ fontSize:12, color:"var(--text-muted)" }}>mi</span>
                    </div>

                    {/* Color picker */}
                    <div style={{ display:"flex", gap:5 }}>
                      {RALLY_COLORS.map(col => (
                        <button key={col} onClick={() => updateRally(rp.id, { color:col })}
                          style={{ width:20, height:20, borderRadius:"50%", background:col, border: rp.color===col?"2px solid #1d1d1f":"2px solid transparent", cursor:"pointer", transition:"transform 0.1s" }} />
                      ))}
                    </div>

                    {/* Edit */}
                    <button onClick={() => setEditingRally({...rp, _city:"", _country:"Kenya"})}
                      style={{ border:"1px solid var(--border-strong)", background:"var(--surface)", color:"var(--text-secondary)", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:500, cursor:"pointer" }}>
                      Edit
                    </button>

                    {/* Remove */}
                    <button onClick={() => { setRallyPoints(pts => pts.filter(p => p.id!==rp.id)); deleteRallyPoint(rp.id); }}
                      style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                      Remove
                    </button>
                  </div>
                ))}
              </div>

              {/* Add Rally Point form */}
              {showAddRally && (
                <div style={{ marginTop:16, padding:18, background:"var(--surface3)", borderRadius:12, border:"1px solid var(--border)" }}>
                  <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>New Rally Point</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
                    <div className="field-group">
                      <div className="field-label">City Name <span style={{ color:"var(--text-muted)", fontWeight:400 }}>(becomes the label)</span></div>
                      <input type="text" placeholder="e.g. Nairobi" value={newRally.city} onChange={e => { setNewRally(p=>({...p, city:e.target.value, name:e.target.value})); setRallyGeoError(""); }} />
                    </div>
                    <div className="field-group">
                      <div className="field-label">Country</div>
                      <select value={newRally.country} onChange={e => setNewRally(p=>({...p,country:e.target.value}))}>
                        {Object.keys(COUNTRIES).filter(c=>c!=="Other").map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div className="field-group">
                      <div className="field-label">Radius (miles)</div>
                      <input type="number" min="10" max="500" value={newRally.radiusMiles} onChange={e => setNewRally(p=>({...p,radiusMiles:Number(e.target.value)}))} />
                    </div>
                    <div className="field-group">
                      <div className="field-label">Color</div>
                      <div style={{ display:"flex", gap:7, marginTop:6 }}>
                        {RALLY_COLORS.map(col => (
                          <button key={col} onClick={() => setNewRally(p=>({...p,color:col}))}
                            style={{ width:26, height:26, borderRadius:"50%", background:col, border: newRally.color===col?"3px solid #1d1d1f":"2px solid transparent", cursor:"pointer" }} />
                        ))}
                      </div>
                    </div>
                  </div>
                  {rallyGeoError && <div style={{ fontSize:12, color:"var(--danger)", marginBottom:10 }}>{rallyGeoError}</div>}
                  <div style={{ display:"flex", gap:8 }}>
                    <button className="btn-back" onClick={() => { setShowAddRally(false); setRallyGeoError(""); }} style={{ flex:1 }}>Cancel</button>
                    <button className="btn-next" disabled={rallyGeocoding || !newRally.city.trim()} onClick={async () => {
                      setRallyGeocoding(true); setRallyGeoError("");
                      // Geocode city + country
                      const query = encodeURIComponent(`${newRally.city}, ${newRally.country}`);
                      try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`, { headers:{"Accept-Language":"en","User-Agent":"EastAfricaChurchApp/1.0"} });
                        const data = await res.json();
                        if (!data?.[0]) { setRallyGeoError(`Could not find "${newRally.city}, ${newRally.country}". Check spelling.`); setRallyGeocoding(false); return; }
                        const lat = parseFloat(data[0].lat), lng = parseFloat(data[0].lon);
                        const newRp = { name:`${newRally.city}, ${newRally.country}`, lat, lng, radiusMiles:Number(newRally.radiusMiles)||50, color:newRally.color };
                        const saveRes = await fetch(`${SUPABASE_URL}/rest/v1/rally_points`, {
                          method:"POST",
                          headers:{"Content-Type":"application/json",apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,Prefer:"return=representation"},
                          body:JSON.stringify({ name:newRp.name, lat:newRp.lat, lng:newRp.lng, radius_miles:newRp.radiusMiles, color:newRp.color }),
                        });
                        const rows = await saveRes.json();
                        setRallyPoints(pts => [...pts, { ...newRp, id: rows?.[0]?.id || Date.now() }]);
                        setNewRally({ name:"", city:"", country:"Kenya", radiusMiles:50, color:"#87CEEB" });
                        setShowAddRally(false);
                      } catch(e) { setRallyGeoError("Network error. Try again."); }
                      setRallyGeocoding(false);
                    }}>
                      {rallyGeocoding ? "Finding location…" : "Add Rally Point"}
                    </button>
                  </div>
                </div>
              )}

              {/* Edit Rally Point modal */}
              {editingRally && (
                <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300, padding:16 }} onClick={() => setEditingRally(null)}>
                  <div style={{ background:"var(--surface)", borderRadius:20, padding:26, maxWidth:480, width:"100%", boxShadow:"var(--shadow-lg)" }} onClick={e => e.stopPropagation()}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 }}>
                      <div style={{ fontSize:16, fontWeight:700 }}>Edit Rally Point</div>
                      <button onClick={() => setEditingRally(null)} style={{ border:"none", background:"var(--surface3)", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:13, color:"var(--text-muted)" }}>✕</button>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                      <div className="field-group">
                        <div className="field-label">Name / Label</div>
                        <input type="text" value={editingRally.name} onChange={e => setEditingRally(r=>({...r,name:e.target.value}))} />
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                        <div className="field-group">
                          <div className="field-label">Re-geocode City</div>
                          <input type="text" placeholder="e.g. Kisumu" value={editingRally._city||""} onChange={e => setEditingRally(r=>({...r,_city:e.target.value}))} />
                        </div>
                        <div className="field-group">
                          <div className="field-label">Country</div>
                          <select value={editingRally._country||"Kenya"} onChange={e => setEditingRally(r=>({...r,_country:e.target.value}))}>
                            {Object.keys(COUNTRIES).filter(c=>c!=="Other").map(c => <option key={c} value={c}>{c}</option>)}
                          </select>
                        </div>
                      </div>
                      {editingRally._city && (
                        <button onClick={async () => {
                          setRallyGeocoding(true);
                          const q = encodeURIComponent(`${editingRally._city}, ${editingRally._country||"Kenya"}`);
                          const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`, { headers:{"Accept-Language":"en","User-Agent":"EastAfricaChurchApp/1.0"} });
                          const data = await res.json();
                          if (data?.[0]) setEditingRally(r=>({...r, lat:parseFloat(data[0].lat), lng:parseFloat(data[0].lon), name:r._city+", "+(r._country||"Kenya")}));
                          setRallyGeocoding(false);
                        }} style={{ padding:"8px", border:"1px solid var(--border-strong)", background:"var(--surface2)", borderRadius:9, fontSize:13, fontWeight:500, cursor:"pointer", color:"var(--text-secondary)" }}>
                          {rallyGeocoding ? "Finding…" : "📍 Update Location"}
                        </button>
                      )}
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                        <div className="field-group">
                          <div className="field-label">Latitude</div>
                          <input type="number" value={editingRally.lat} onChange={e => setEditingRally(r=>({...r,lat:parseFloat(e.target.value)}))} style={{ fontSize:13 }} />
                        </div>
                        <div className="field-group">
                          <div className="field-label">Longitude</div>
                          <input type="number" value={editingRally.lng} onChange={e => setEditingRally(r=>({...r,lng:parseFloat(e.target.value)}))} style={{ fontSize:13 }} />
                        </div>
                      </div>
                      <div className="field-group">
                        <div className="field-label">Radius (miles)</div>
                        <input type="number" min="10" max="500" value={editingRally.radiusMiles} onChange={e => setEditingRally(r=>({...r,radiusMiles:Number(e.target.value)}))} />
                      </div>
                      <div>
                        <div className="field-label">Color</div>
                        <div style={{ display:"flex", gap:8, marginTop:8 }}>
                          {RALLY_COLORS.map(col => (
                            <button key={col} onClick={() => setEditingRally(r=>({...r,color:col}))}
                              style={{ width:26, height:26, borderRadius:"50%", background:col, border: editingRally.color===col?"3px solid #1d1d1f":"2px solid transparent", cursor:"pointer" }} />
                          ))}
                        </div>
                      </div>
                      <div style={{ display:"flex", gap:8, marginTop:4 }}>
                        <button className="btn-back" onClick={() => setEditingRally(null)} style={{ flex:1 }}>Cancel</button>
                        <button className="btn-next" onClick={() => {
                          updateRally(editingRally.id, { name:editingRally.name, lat:editingRally.lat, lng:editingRally.lng, radiusMiles:editingRally.radiusMiles, color:editingRally.color });
                          setEditingRally(null);
                        }}>Save Changes</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {viewMode==="map" && (
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", overflow:"hidden", boxShadow:"var(--shadow-sm)" }}>
              <div style={{ padding:"12px 20px", borderBottom:"1px solid var(--border)", display:"flex", gap:18, flexWrap:"wrap", alignItems:"center" }}>
                {[["STRONG","#34C759"],["Growing","#FF9500"],["Stable","#007AFF"]].map(([l,c]) => (
                  <div key={l} style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"var(--text-secondary)" }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:c }} />{l}
                  </div>
                ))}
                {rallyPoints.map(rp => (
                  <div key={rp.id} style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"var(--text-secondary)" }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:rp.color, boxShadow:`0 0 6px ${rp.color}88` }} />📡 {rp.name} ({rp.radiusMiles}mi)
                  </div>
                ))}
                <div style={{ fontSize:11, color:"var(--text-muted)", marginLeft:"auto" }}>Click pins for details · Layer switcher top-right</div>
              </div>
              <div ref={mapRef} style={{ height:720, width:"100%" }} />
            </div>
          )}

          {viewMode==="region" && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:10 }}>
              {Object.entries(byRegion).sort((a,b)=>b[1].count-a[1].count).map(([region,d]) => (
                <div key={region} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:14, padding:"16px 18px", boxShadow:"var(--shadow-sm)" }}>
                  <div style={{ fontSize:14, fontWeight:700, marginBottom:6, letterSpacing:"-0.01em" }}>{region}</div>
                  <div style={{ display:"flex", gap:12, marginBottom:10 }}>
                    <div><div style={{ fontSize:22, fontWeight:700, color:"var(--accent)", lineHeight:1 }}>{d.count}</div><div style={{ fontSize:11, color:"var(--text-muted)" }}>churches</div></div>
                    <div><div style={{ fontSize:22, fontWeight:700, color:"var(--success)", lineHeight:1 }}>{d.members}</div><div style={{ fontSize:11, color:"var(--text-muted)" }}>members</div></div>
                  </div>
                  <div style={{ fontSize:12, color:"var(--text-muted)", lineHeight:1.5 }}>{d.churches.map(c=>c.pastor.split(" ").pop()).join(", ")}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Admin Users ───────────────────────────────────────────────────────────

    // ── TripsTab ──────────────────────────────────────────────────────────────
    const EXPENSE_TYPES = [
      { key:"transport", label:"Transport / Car Hire" },
      { key:"lodging",   label:"Lodging / Accommodation" },
      { key:"food",      label:"Food / Meals" },
      { key:"comms",     label:"Airtime / Data" },
      { key:"other",     label:"Other" },
    ];

    function TripsTab() {
      const [view, setView]         = React.useState("list"); // "list" | "form"
      const [trips, setTrips]       = React.useState([]);
      const [loading, setLoading]   = React.useState(true);
      const [selected, setSelected] = React.useState(null);
      const [saving, setSaving]     = React.useState(false);
      const [ugxRate, setUgxRate]   = React.useState(3700);
      const [editingId, setEditingId] = React.useState(null); // non-null = editing existing record

      // Form state
      const blank = { requester_name:"", region:"", departure_date:"", return_date:"", objective:"", notes:"", submitted_by:"", stops:[] };
      const [form, setForm]         = React.useState(blank);

      const loadTrips = async () => {
        setLoading(true);
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/trip_requests?order=submitted_at.desc`, {
            headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
          });
          if (res.ok) setTrips(await res.json());
        } catch(e) { console.warn("loadTrips:", e); }
        setLoading(false);
      };

      React.useEffect(() => { loadTrips(); }, []);

      const addStop = () => {
        setForm(f => ({ ...f, stops: [...f.stops, { location:"", church:"", purpose:"", expenses:{ transport:0, lodging:0, food:0, comms:0, other:0 }, notes:{ transport:"", lodging:"", food:"", comms:"", other:"" } }] }));
      };
      const removeStop = (i) => setForm(f => ({ ...f, stops: f.stops.filter((_,idx) => idx !== i) }));
      const updateStop = (i, field, val) => setForm(f => {
        const stops = [...f.stops];
        stops[i] = { ...stops[i], [field]: val };
        return { ...f, stops };
      });
      const updateExpense = (si, key, val) => setForm(f => {
        const stops = [...f.stops];
        stops[si] = { ...stops[si], expenses:{ ...stops[si].expenses, [key]: parseFloat(val)||0 } };
        return { ...f, stops };
      });
      const updateExpenseNote = (si, key, val) => setForm(f => {
        const stops = [...f.stops];
        stops[si] = { ...stops[si], notes:{ ...stops[si].notes, [key]: val } };
        return { ...f, stops };
      });

      const stopUGX = (stop) => Object.values(stop.expenses||{}).reduce((s,v)=>s+(parseFloat(v)||0),0);
      const totalUGX = form.stops.reduce((s,st)=>s+stopUGX(st),0);
      const totalUSD = totalUGX / ugxRate;

      const editTrip = (trip) => {
        const stops = (trip.stops_json || []).map(s => ({
          location: s.location || "",
          church:   s.church   || "",
          purpose:  s.purpose  || "",
          expenses: { transport:0, lodging:0, food:0, comms:0, other:0, ...s.expenses },
          notes:    { transport:"", lodging:"", food:"", comms:"", other:"", ...s.notes },
        }));
        setForm({
          requester_name: trip.requester_name || "",
          region:         trip.region         || "",
          departure_date: trip.departure_date || "",
          return_date:    trip.return_date    || "",
          objective:      trip.objective      || "",
          notes:          trip.notes          || "",
          submitted_by:   trip.submitted_by   || "",
          stops,
        });
        setEditingId(trip.id);
        setSelected(null);
        setView("form");
      };

      const submitForm = async () => {
        if (!form.requester_name.trim()) { alert("Requester name is required."); return; }
        setSaving(true);
        const payload = {
          requester_name: form.requester_name,
          region:         form.region,
          departure_date: form.departure_date || null,
          return_date:    form.return_date || null,
          objective:      form.objective,
          stops_json:     form.stops,
          notes:          form.notes,
          submitted_by:   form.submitted_by,
          total_ugx:      totalUGX,
          total_usd:      parseFloat(totalUSD.toFixed(2)),
        };
        const isEdit = !!editingId;
        if (!isEdit) payload.status = "Pending";
        const url = isEdit
          ? `${SUPABASE_URL}/rest/v1/trip_requests?id=eq.${editingId}`
          : `${SUPABASE_URL}/rest/v1/trip_requests`;
        const res = await fetch(url, {
          method: isEdit ? "PATCH" : "POST",
          headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=minimal" },
          body: JSON.stringify(payload)
        });
        setSaving(false);
        if (res.ok) {
          setForm(blank);
          setEditingId(null);
          setView("list");
          loadTrips();
        } else {
          alert("Save failed: " + await res.text());
        }
      };

      const updateStatus = async (id, status) => {
        await fetch(`${SUPABASE_URL}/rest/v1/trip_requests?id=eq.${id}`, {
          method:"PATCH",
          headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=minimal" },
          body: JSON.stringify({ status })
        });
        setTrips(ts => ts.map(t => t.id===id ? {...t, status} : t));
        if (selected?.id===id) setSelected(s=>({...s, status}));
      };

      const STATUS_COLORS = { Pending:"#FF9500", Approved:"#34C759", Denied:"#FF3B30", Amendment:"#8b5cf6" };

      const fmtDate = (d) => d ? new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";
      const fmtUSD  = (n) => n != null ? "$"+parseFloat(n).toFixed(2) : "—";

      // ── Detail view ──
      if (selected) {
        const stops = selected.stops_json || [];
        return (
          <div style={{ flex:1, overflowY:"auto", padding:"24px", maxWidth:860, margin:"0 auto", width:"100%" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
              <button onClick={() => setSelected(null)} style={{ border:"none", background:"var(--surface3)", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:13, color:"var(--text-muted)" }}>← Back</button>
              <div style={{ fontSize:18, fontWeight:700 }}>{selected.requester_name}</div>
              <span style={{ background: STATUS_COLORS[selected.status]||"#8e8e93", color:"#fff", borderRadius:8, fontSize:12, fontWeight:700, padding:"3px 10px" }}>{selected.status}</span>
              <div style={{ marginLeft:"auto", display:"flex", gap:6, flexWrap:"wrap" }}>
                <button onClick={() => editTrip(selected)}
                  style={{ padding:"6px 14px", border:"1.5px solid var(--accent)", borderRadius:8, fontSize:12, fontWeight:600, cursor:"pointer", background:"transparent", color:"var(--accent)" }}>
                  Edit Trip
                </button>
                {["Pending","Approved","Denied","Amendment"].map(s => (
                  <button key={s} onClick={() => updateStatus(selected.id, s)}
                    style={{ padding:"6px 12px", border:`1.5px solid ${STATUS_COLORS[s]||"#8e8e93"}`, borderRadius:8, fontSize:12, fontWeight:600, cursor:"pointer",
                      background: selected.status===s ? (STATUS_COLORS[s]||"#8e8e93") : "transparent",
                      color: selected.status===s ? "#fff" : (STATUS_COLORS[s]||"#8e8e93") }}>{s}</button>
                ))}
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
              {[["Region", selected.region],["Departure", fmtDate(selected.departure_date)],["Return", fmtDate(selected.return_date)],["Submitted By", selected.submitted_by],["Submitted", new Date(selected.submitted_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})],["Total", fmtUSD(selected.total_usd)+" USD"]].map(([l,v])=>(
                <div key={l} style={{ background:"var(--surface2)", borderRadius:10, padding:"12px 14px" }}>
                  <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px", color:"var(--text-muted)", marginBottom:4 }}>{l}</div>
                  <div style={{ fontSize:14, fontWeight:600 }}>{v||"—"}</div>
                </div>
              ))}
            </div>
            {selected.travelers_json && selected.travelers_json.length > 0 && (
              <div style={{ background:"var(--surface2)", borderRadius:10, padding:"14px 16px", marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px", color:"var(--text-muted)", marginBottom:8 }}>Travelers</div>
                <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                  <div style={{ fontSize:13 }}><span style={{ color:"var(--text-muted)", fontSize:12, marginRight:8 }}>1</span><strong>{selected.requester_name}</strong> <span style={{ color:"var(--text-muted)", fontSize:11 }}>(requester)</span></div>
                  {selected.travelers_json.map((name, i) => (
                    <div key={i} style={{ fontSize:13 }}><span style={{ color:"var(--text-muted)", fontSize:12, marginRight:8 }}>{i+2}</span>{name}</div>
                  ))}
                </div>
              </div>
            )}
            {selected.is_amendment && selected.amendment_notes && (
              <div style={{ background:"#f5f3ff", border:"1.5px solid #c4b5fd", borderRadius:10, padding:"14px 16px", marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px", color:"#7c3aed", marginBottom:6 }}>Amendment — What Changed</div>
                <div style={{ fontSize:14, lineHeight:1.5 }}>{selected.amendment_notes}</div>
              </div>
            )}
            {selected.objective && (
              <div style={{ background:"var(--surface2)", borderRadius:10, padding:"14px 16px", marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px", color:"var(--text-muted)", marginBottom:6 }}>Objective</div>
                <div style={{ fontSize:14, lineHeight:1.5 }}>{selected.objective}</div>
              </div>
            )}
            {stops.map((stop, i) => (
              <div key={i} style={{ border:"1.5px solid var(--border-strong)", borderRadius:12, padding:18, marginBottom:12 }}>
                <div style={{ fontSize:13, fontWeight:700, color:"var(--accent)", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:10 }}>Stop {i+1}</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
                  <div><span style={{ fontSize:12, color:"var(--text-muted)" }}>Location: </span><span style={{ fontWeight:600 }}>{stop.location||"—"}</span></div>
                  <div><span style={{ fontSize:12, color:"var(--text-muted)" }}>Church: </span><span style={{ fontWeight:600 }}>{stop.church||"—"}</span></div>
                  {stop.purpose && <div style={{ gridColumn:"1/-1" }}><span style={{ fontSize:12, color:"var(--text-muted)" }}>Purpose: </span><span>{stop.purpose}</span></div>}
                </div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead><tr>{["Category","Notes","UGX","USD"].map(h=><th key={h} style={{ textAlign:h==="UGX"||h==="USD"?"right":"left", paddingBottom:6, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px", color:"var(--text-muted)" }}>{h}</th>)}</tr></thead>
                  <tbody>
                    {EXPENSE_TYPES.map(et => {
                      const ugx = stop.expenses?.[et.key]||0;
                      if (!ugx && !stop.notes?.[et.key]) return null;
                      return (
                        <tr key={et.key}>
                          <td style={{ padding:"4px 0" }}>{et.label}</td>
                          <td style={{ padding:"4px 8px", color:"var(--text-muted)", fontSize:12 }}>{stop.notes?.[et.key]||""}</td>
                          <td style={{ textAlign:"right", padding:"4px 0" }}>{ugx.toLocaleString()}</td>
                          <td style={{ textAlign:"right", padding:"4px 0", fontWeight:600, color:"#065f46" }}>${(ugx/3700).toFixed(2)}</td>
                        </tr>
                      );
                    })}
                    <tr style={{ borderTop:"1.5px solid var(--border)" }}>
                      <td colSpan={2} style={{ paddingTop:8, fontWeight:700 }}>Subtotal</td>
                      <td style={{ textAlign:"right", paddingTop:8, fontWeight:700 }}>{Object.values(stop.expenses||{}).reduce((s,v)=>s+(v||0),0).toLocaleString()}</td>
                      <td style={{ textAlign:"right", paddingTop:8, fontWeight:700, color:"#065f46" }}>${(Object.values(stop.expenses||{}).reduce((s,v)=>s+(v||0),0)/3700).toFixed(2)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            ))}
            {selected.notes && (
              <div style={{ background:"var(--surface2)", borderRadius:10, padding:"14px 16px", marginTop:4 }}>
                <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px", color:"var(--text-muted)", marginBottom:6 }}>Notes</div>
                <div style={{ fontSize:14, lineHeight:1.5 }}>{selected.notes}</div>
              </div>
            )}
            <div style={{ marginTop:16, display:"flex", gap:8 }}>
              <div style={{ flex:1, background:"var(--surface2)", borderRadius:10, padding:"14px 18px", textAlign:"center" }}>
                <div style={{ fontSize:12, color:"var(--text-muted)" }}>Total (UGX)</div>
                <div style={{ fontSize:18, fontWeight:800 }}>{parseFloat(selected.total_ugx||0).toLocaleString()} UGX</div>
              </div>
              <div style={{ flex:1, background:"#f0fdf8", border:"1.5px solid #a7f3d0", borderRadius:10, padding:"14px 18px", textAlign:"center" }}>
                <div style={{ fontSize:12, color:"#065f46" }}>Total Requested (USD)</div>
                <div style={{ fontSize:22, fontWeight:800, color:"#065f46" }}>{fmtUSD(selected.total_usd)}</div>
              </div>
            </div>
          </div>
        );
      }

      // ── List view ──
      if (view === "list") return (
        <div style={{ flex:1, overflowY:"auto", padding:"24px" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
            <div>
              <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.025em" }}>Trip Requests</div>
              <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:2 }}>Field travel requests — Project Kanyea</div>
            </div>
            <button onClick={() => { setForm(blank); addStop(); setView("form"); }} style={{ padding:"9px 16px", border:"none", borderRadius:9, background:"var(--accent)", color:"#fff", fontSize:13, fontWeight:600, cursor:"pointer" }}>+ New Request</button>
          </div>

          {loading ? (
            <div style={{ textAlign:"center", padding:"60px", color:"var(--text-muted)" }}>Loading…</div>
          ) : trips.length === 0 ? (
            <div style={{ textAlign:"center", padding:"60px", color:"var(--text-muted)", fontSize:14 }}>No trip requests yet. Submit the first one.</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {trips.map(t => (
                <div key={t.id} onClick={() => setSelected(t)} style={{ background:"var(--surface)", border:"1px solid var(--border-strong)", borderRadius:12, padding:"16px 18px", cursor:"pointer", display:"flex", alignItems:"center", gap:14 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <span style={{ fontWeight:700, fontSize:15 }}>{t.requester_name}</span>
                      <span style={{ background: STATUS_COLORS[t.status]||"#8e8e93", color:"#fff", borderRadius:8, fontSize:11, fontWeight:700, padding:"2px 8px" }}>{t.status}</span>
                    </div>
                    <div style={{ fontSize:12, color:"var(--text-muted)" }}>
                      {t.region && <span>{t.region} &nbsp;·&nbsp; </span>}
                      {t.departure_date && <span>{fmtDate(t.departure_date)} → {fmtDate(t.return_date)} &nbsp;·&nbsp; </span>}
                      <span>{(t.stops_json||[]).length} stop{(t.stops_json||[]).length!==1?"s":""}</span>
                    </div>
                    {t.objective && <div style={{ fontSize:12, color:"var(--text-secondary)", marginTop:4, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:500 }}>{t.objective}</div>}
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontSize:16, fontWeight:800, color:"#065f46" }}>{fmtUSD(t.total_usd)}</div>
                    <div style={{ fontSize:11, color:"var(--text-muted)" }}>{parseFloat(t.total_ugx||0).toLocaleString()} UGX</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );

      // ── Form view ──
      const Field = ({label, children}) => (
        <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
          <label style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px", color:"var(--text-muted)" }}>{label}</label>
          {children}
        </div>
      );
      const inp = {width:"100%",padding:"9px 12px",border:"1.5px solid var(--border-strong)",borderRadius:8,fontSize:14,color:"var(--text)",background:"var(--surface2)",fontFamily:"inherit"};

      return (
        <div style={{ flex:1, overflowY:"auto", padding:"24px", maxWidth:860, margin:"0 auto", width:"100%" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
            <button onClick={() => { setView("list"); setEditingId(null); setForm(blank); }} style={{ border:"none", background:"var(--surface3)", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:13, color:"var(--text-muted)" }}>← Back</button>
            <div style={{ fontSize:18, fontWeight:700 }}>{editingId ? "Edit Trip Request" : "New Trip Request"}</div>
            {editingId && <span style={{ background:"#f5f3ff", color:"#7c3aed", border:"1px solid #c4b5fd", borderRadius:8, fontSize:12, fontWeight:600, padding:"3px 10px" }}>Editing</span>}
          </div>

          {/* Requester Info */}
          <div style={{ background:"var(--surface)", border:"1px solid var(--border-strong)", borderRadius:12, padding:20, marginBottom:14 }}>
            <div style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.6px", color:"var(--accent)", marginBottom:14 }}>Requester Information</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
              <Field label="Full Name"><input style={inp} value={form.requester_name} onChange={e=>setForm(f=>({...f,requester_name:e.target.value}))} placeholder="e.g. Brother Isaac Okuru" /></Field>
              <Field label="Country / Region"><input style={inp} value={form.region} onChange={e=>setForm(f=>({...f,region:e.target.value}))} placeholder="e.g. Uganda" /></Field>
              <Field label="Departure Date"><input style={inp} type="date" value={form.departure_date} onChange={e=>setForm(f=>({...f,departure_date:e.target.value}))} /></Field>
              <Field label="Return Date"><input style={inp} type="date" value={form.return_date} onChange={e=>setForm(f=>({...f,return_date:e.target.value}))} /></Field>
            </div>
            <Field label="Trip Objective"><textarea style={{...inp,minHeight:70,resize:"vertical"}} value={form.objective} onChange={e=>setForm(f=>({...f,objective:e.target.value}))} placeholder="Churches to visit and what you hope to accomplish" /></Field>
          </div>

          {/* Exchange rate */}
          <div style={{ background:"#f0f9ff", border:"1px solid #bae6fd", borderRadius:8, padding:"10px 14px", fontSize:12, color:"#0369a1", display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
            <span>Exchange rate: <strong>1 USD =</strong></span>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <input type="number" value={ugxRate} onChange={e=>setUgxRate(parseFloat(e.target.value)||3700)}
                style={{ width:100, padding:"4px 8px", border:"1.5px solid #7dd3fc", borderRadius:6, fontSize:12, textAlign:"right", background:"white" }} />
              <span><strong>UGX</strong> (update as needed)</span>
            </div>
          </div>

          {/* Stops */}
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.6px", color:"var(--accent)", marginBottom:10 }}>Stops & Expense Breakdown</div>
            {form.stops.map((stop, si) => (
              <div key={si} style={{ border:"1.5px solid var(--border-strong)", borderRadius:12, padding:18, marginBottom:12, background:"var(--surface)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:"var(--accent)", textTransform:"uppercase", letterSpacing:"0.5px" }}>Stop {si+1}</span>
                  <button onClick={() => removeStop(si)} style={{ background:"none", border:"none", color:"var(--text-muted)", cursor:"pointer", fontSize:12, padding:"3px 8px", borderRadius:6 }}>Remove</button>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
                  <Field label="Location / Town"><input style={inp} value={stop.location} onChange={e=>updateStop(si,"location",e.target.value)} placeholder="e.g. Tororo, Lira" /></Field>
                  <Field label="Church / Site"><input style={inp} value={stop.church} onChange={e=>updateStop(si,"church",e.target.value)} placeholder="e.g. Church of Christ Iganga" /></Field>
                </div>
                <Field label="Purpose / Objective"><input style={{...inp,marginBottom:12}} value={stop.purpose} onChange={e=>updateStop(si,"purpose",e.target.value)} placeholder="Survey setup, podcast training, fellowship" /></Field>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead><tr>{["Expense Category","Notes","Amount (UGX)","USD"].map(h=><th key={h} style={{ textAlign:h.includes("UGX")||h==="USD"?"right":"left", paddingBottom:8, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px", color:"var(--text-muted)" }}>{h}</th>)}</tr></thead>
                  <tbody>
                    {EXPENSE_TYPES.map(et => (
                      <tr key={et.key}>
                        <td style={{ padding:"4px 0", width:"35%", fontWeight:500 }}>{et.label}</td>
                        <td style={{ padding:"4px 6px" }}><input style={{...inp,padding:"5px 8px",fontSize:12}} value={stop.notes?.[et.key]||""} onChange={e=>updateExpenseNote(si,et.key,e.target.value)} placeholder="Optional" /></td>
                        <td style={{ padding:"4px 6px", width:130 }}><input type="number" min="0" style={{...inp,padding:"5px 8px",fontSize:12,textAlign:"right"}} value={stop.expenses?.[et.key]||""} onChange={e=>updateExpense(si,et.key,e.target.value)} placeholder="0" /></td>
                        <td style={{ textAlign:"right", padding:"4px 0", fontWeight:600, color:"#065f46", width:80 }}>${((stop.expenses?.[et.key]||0)/ugxRate).toFixed(2)}</td>
                      </tr>
                    ))}
                    <tr style={{ borderTop:"1.5px solid var(--border)" }}>
                      <td colSpan={2} style={{ paddingTop:8, fontWeight:700 }}>Stop Subtotal</td>
                      <td style={{ textAlign:"right", paddingTop:8, fontWeight:700 }}>{stopUGX(stop).toLocaleString()} UGX</td>
                      <td style={{ textAlign:"right", paddingTop:8, fontWeight:700, color:"#065f46" }}>${(stopUGX(stop)/ugxRate).toFixed(2)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            ))}
            <button onClick={addStop} style={{ padding:"9px 16px", border:"1.5px solid var(--accent)", borderRadius:9, background:"transparent", color:"var(--accent)", fontSize:13, fontWeight:600, cursor:"pointer" }}>+ Add Stop</button>
          </div>

          {/* Grand Total */}
          <div style={{ background:"#f0fdf8", border:"1.5px solid #a7f3d0", borderRadius:10, padding:"16px 20px", marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:14, padding:"3px 0" }}><span>Total (UGX)</span><span>{totalUGX.toLocaleString()} UGX</span></div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:14, padding:"3px 0" }}><span>Total (USD)</span><span>${totalUSD.toFixed(2)}</span></div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:16, fontWeight:800, color:"#065f46", borderTop:"1.5px solid #6ee7b7", marginTop:8, paddingTop:10 }}><span>Total Requested</span><span>${totalUSD.toFixed(2)} USD</span></div>
          </div>

          {/* Notes & Signature */}
          <div style={{ background:"var(--surface)", border:"1px solid var(--border-strong)", borderRadius:12, padding:20, marginBottom:16 }}>
            <div style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.6px", color:"var(--accent)", marginBottom:14 }}>Notes & Signature</div>
            <Field label="Additional Notes"><textarea style={{...inp,minHeight:70,resize:"vertical",marginBottom:12}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Special circumstances, contingency plans, context for trustees" /></Field>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              <Field label="Submitted By"><input style={inp} value={form.submitted_by} onChange={e=>setForm(f=>({...f,submitted_by:e.target.value}))} placeholder="Your name" /></Field>
              <div />
            </div>
          </div>

    // ─── CSV Export Utilities ──────────────────────────────────────────────────
    function toCSV(rows, headers) {
      const escape = v => {
        if (v == null || v === "") return "";
        const s = String(v).replace(/"/g, '""');
        return /[,"\n\r]/.test(s) ? '"' + s + '"' : s;
      };
      const lines = [
        headers.map(([label]) => escape(label)).join(","),
        ...rows.map(row => headers.map(([, key]) => escape(typeof key === "function" ? key(row) : row[key])).join(","))
      ];
      return lines.join("\r\n");
    }

    function downloadCSV(csv, filename) {
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── Portal Shell ──────────────────────────────────────────────────────────
    // ─── Geocoding ────────────────────────────────────────────────────────────
    async function geocode(church) {
      // Try progressively broader queries until we get a hit
      const queries = [
        [church.location, church.region, church.country],
        [church.church_name, church.region, church.country],
        [church.location, church.country],
        [church.church_name, church.country],
        [church.region, church.country],
        [church.location],
        [church.region],
      ].map(parts => parts.filter(Boolean).join(", ")).filter(q => q.length > 2);

      for (const query of queries) {
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=ug,ke,tz,rw,et,bi,cd,ss,mz,zm,mw,zw`,
            { headers: { "Accept-Language": "en", "User-Agent": "EastAfricaChurchApp/1.0" } }
          );
          const data = await res.json();
          if (data && data[0]) {
            return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
          }
        } catch(e) { console.warn("geocode failed for:", query, e.message); }
        // Small delay between requests to respect rate limits
        await new Promise(r => setTimeout(r, 300));
      }
      return { lat: 0, lng: 0 };
    }

    async function geocodeAndSave(church, onUpdate) {
      if (church.lat && church.lat !== 0) return; // already has coords
      const coords = await geocode(church);
      if (coords.lat !== 0) {
        onUpdate({ ...church, ...coords });
        // Save coords to Supabase
        saveChurchOverride(church.id, { lat: coords.lat, lng: coords.lng });
      }
    }

    // ─── Orders Supabase functions ─────────────────────────────────────────────
    async function fetchInventory() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/inventory_items?active=eq.true&order=category,name`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        });
        const rows = await res.json();
        return Array.isArray(rows) ? rows : [];
      } catch(e) { return []; }
    }

    async function saveInventoryItem(item) {
      await fetch(`${SUPABASE_URL}/rest/v1/inventory_items`, {
        method: "POST",
        headers: { "Content-Type":"application/json", apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Prefer:"resolution=merge-duplicates,return=minimal" },
        body: JSON.stringify(item),
      });
    }

    async function deleteInventoryItem(id) {
      await fetch(`${SUPABASE_URL}/rest/v1/inventory_items?id=eq.${id}`, {
        method: "DELETE",
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
      });
    }

    async function createOrder(orderData) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
        method: "POST",
        headers: { "Content-Type":"application/json", apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Prefer:"return=representation" },
        body: JSON.stringify({ ...orderData, order_number: "" }),
      });
      const rows = await res.json();
      return Array.isArray(rows) ? rows[0] : rows;
    }

    async function fetchOrders() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        });
        const rows = await res.json();
        return Array.isArray(rows) ? rows : [];
      } catch(e) { return []; }
    }

    async function updateOrderStatus(id, status) {
      await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
        method: "PATCH",
        headers: { "Content-Type":"application/json", apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Prefer:"return=minimal" },
        body: JSON.stringify({ status, updated_at: new Date().toISOString() }),
      });
    }
