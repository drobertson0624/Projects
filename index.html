                              </select>
                            )}
                            <button disabled={working} onClick={async () => {
                              setQueueWorking(w=>({...w,[item.id]:true}));
                              await approveQueueItem(item.id, item.raw_name);
                              onQueueAction && onQueueAction();
                            }} style={{ fontSize:12, padding:"5px 10px", borderRadius:7, border:"none", background:"#34C759", color:"#fff", fontWeight:600, cursor:"pointer", opacity:working?0.5:1 }}>Approve</button>
                            {mergeTargets[item.id] && (
                              <button disabled={working} onClick={async () => {
                                setQueueWorking(w=>({...w,[item.id]:true}));
                                await mergeQueueItem(item.id, mergeTargets[item.id], item.raw_name);
                                onQueueAction && onQueueAction();
                              }} style={{ fontSize:12, padding:"5px 10px", borderRadius:7, border:"none", background:"#007AFF", color:"#fff", fontWeight:600, cursor:"pointer", opacity:working?0.5:1 }}>Merge</button>
                            )}
                            <button disabled={working} onClick={async () => {
                              setQueueWorking(w=>({...w,[item.id]:true}));
                              await ignoreQueueItem(item.id);
                              onQueueAction && onQueueAction();
                            }} style={{ fontSize:12, padding:"5px 10px", borderRadius:7, border:"1px solid var(--border-strong)", background:"var(--surface)", color:"var(--text-muted)", fontWeight:500, cursor:"pointer", opacity:working?0.5:1 }}>Ignore</button>
                          </div>
                        </div>
                          </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Queue Merge Modal */}
              {showQueueMerge && queueMergeSel.length === 2 && (() => {
                const qA = churchQueue.find(i => i.id === queueMergeSel[0]);
                const qB = churchQueue.find(i => i.id === queueMergeSel[1]);
                if (!qA || !qB) return null;
                const primary = queueMergePrimary === qA.id ? qA : queueMergePrimary === qB.id ? qB : null;
                const secondary = primary ? (primary.id === qA.id ? qB : qA) : null;
                const closeModal = () => { setShowQueueMerge(false); setQueueMergePrimary(null); };
                return (
                  <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300, padding:16 }} onClick={closeModal}>
                    <div style={{ background:"var(--surface)", borderRadius:20, padding:28, maxWidth:600, width:"100%", boxShadow:"var(--shadow-lg)" }} onClick={e=>e.stopPropagation()}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                        <div style={{ fontSize:17, fontWeight:700 }}>Merge Queue Items</div>
                        <button onClick={closeModal} style={{ border:"none", background:"var(--surface3)", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:13, color:"var(--text-muted)" }}>✕</button>
                      </div>
                      <div style={{ fontSize:13, color:"var(--text-muted)", marginBottom:20 }}>
                        {!primary ? "These look like duplicates. Select which name to keep." : `Keeping "${primary.raw_name}" — the other entry will be removed.`}
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:22 }}>
                        {[qA, qB].map(q => {
                          const isPrimary = primary?.id === q.id;
                          const isSecondary = secondary?.id === q.id;
                          return (
                            <div key={q.id} style={{ border: isPrimary ? "2px solid var(--accent)" : isSecondary ? "2px solid var(--danger)" : "1px solid var(--border-strong)", borderRadius:14, padding:16, position:"relative" }}>
                              {isPrimary && <div style={{ position:"absolute", top:-10, left:16, background:"var(--accent)", color:"#fff", fontSize:11, fontWeight:700, padding:"2px 10px", borderRadius:20 }}>KEEP</div>}
                              {isSecondary && <div style={{ position:"absolute", top:-10, left:16, background:"var(--danger)", color:"#fff", fontSize:11, fontWeight:700, padding:"2px 10px", borderRadius:20 }}>REMOVE</div>}
                              <div style={{ fontWeight:700, fontSize:15, marginBottom:4 }}>{q.raw_name}</div>
                              <div style={{ fontSize:12, color:"var(--text-muted)", marginBottom:12 }}>
                                {q.submission_count} submission{q.submission_count!==1?"s":""}
                                {q.source === "survey" && <span style={{ marginLeft:6, background:"#87CEEB", color:"#1a5f7a", borderRadius:6, fontSize:10, fontWeight:700, padding:"2px 7px" }}>Survey</span>}
                              </div>
                              {!isPrimary && (
                                <button onClick={() => setQueueMergePrimary(q.id)} style={{ width:"100%", padding:"8px", border:"none", borderRadius:9, fontSize:13, fontWeight:600, cursor:"pointer", background: isSecondary ? "var(--surface2)" : "var(--accent)", color: isSecondary ? "var(--text-muted)" : "#fff" }}>
                                  {isSecondary ? "Switch — Keep this one" : "Keep this one"}
                                </button>
                              )}
                              {isPrimary && <div style={{ padding:"8px", borderRadius:9, fontSize:13, fontWeight:600, textAlign:"center", background:"rgba(0,122,255,0.08)", color:"var(--accent)" }}>✓ Keeping this name</div>}
                            </div>
                          );
                        })}
                      </div>
                      <div style={{ display:"flex", gap:8 }}>
                        <button onClick={closeModal} style={{ flex:1, padding:"11px", border:"1px solid var(--border-strong)", background:"var(--surface2)", borderRadius:10, fontSize:13, cursor:"pointer", color:"var(--text-secondary)" }}>Cancel</button>
                        <button
                          disabled={!primary}
                          onClick={async () => {
                            if (!primary || !secondary) return;
                            // Combine submission counts onto primary
                            const combinedCount = (primary.submission_count||0) + (secondary.submission_count||0);
                            await fetch(`${SUPABASE_URL}/rest/v1/church_name_queue?id=eq.${primary.id}`, {
                              method:"PATCH",
                              headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=minimal" },
                              body: JSON.stringify({ submission_count: combinedCount })
                            });
                            await ignoreQueueItem(secondary.id);
                            setQueueMergeSel([]);
                            closeModal();
                            onQueueAction && onQueueAction();
                          }}
                          style={{ flex:2, padding:"11px", border:"none", borderRadius:10, fontSize:13, fontWeight:700, cursor:primary?"pointer":"not-allowed", background:primary?"var(--accent)":"var(--surface3)", color:primary?"#fff":"var(--text-muted)", opacity:primary?1:0.5 }}
                        >
                          {primary ? `Confirm — Remove "${secondary.raw_name}"` : "Select a name to keep first"}
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* Top bar */}
          <div style={{ padding:"20px 24px 0", flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:10 }}>
              <div style={{ display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
                <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.025em" }}>Churches</div>
                {[
                  [churches.filter(c=>!c.archived).length, "total", "var(--text)"],
                  [churches.reduce((s,c)=>s+(c.archived?0:(c.members||0)),0), "members", "var(--accent)"],
                  [deployedCount, "in queue", "var(--success)"],
                  [archivedCount || null, "archived", "var(--text-muted)"],
                  [filtered2.length !== churches.filter(c=>!c.archived).length ? filtered2.length : null, "filtered", "var(--warn)"],
                ].filter(([v])=>v!=null).map(([val,label,color]) => (
                  <div key={label} style={{ fontSize:13, color:"var(--text-muted)" }}>
                    <span style={{ fontWeight:700, color, marginRight:3 }}>{val}</span>{label}
                  </div>
                ))}
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                <button onClick={() => exportDeployQueue(churches)} style={{ display:"flex", alignItems:"center", gap:5, padding:"8px 12px", border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:9, fontSize:12, fontWeight:500, cursor:"pointer", color:"var(--text-secondary)" }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Deploy Queue
                </button>
                <button onClick={() => exportChurchAssessment(churches)} style={{ display:"flex", alignItems:"center", gap:5, padding:"8px 12px", border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:9, fontSize:12, fontWeight:500, cursor:"pointer", color:"var(--text-secondary)" }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Full Export
                </button>
                <button onClick={() => setShowImport(true)} style={{ display:"flex", alignItems:"center", gap:5, padding:"8px 12px", border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:9, fontSize:12, fontWeight:500, cursor:"pointer", color:"var(--text-secondary)" }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Import
                </button>

            <button className="btn-next" style={{ flex:"none", padding:"8px 16px", fontSize:13 }} onClick={() => setShowAdd(true)}>+ Add</button>
              </div>
            </div>

            {/* Saved view tabs */}
            <div style={{ display:"flex", borderBottom:"1px solid var(--border)", overflowX:"auto", scrollbarWidth:"none" }}>
              {views.map(v => (
                <button key={v.id} onClick={() => { setActiveView(v.id); setPage(1); }} style={{ padding:"9px 16px", border:"none", background:"transparent", borderBottom:activeView===v.id?"2px solid var(--accent)":"2px solid transparent", fontSize:13, fontWeight:activeView===v.id?600:400, color:activeView===v.id?"var(--accent)":"var(--text-muted)", cursor:"pointer", whiteSpace:"nowrap", marginBottom:-1, transition:"color 0.15s" }}>
                  {v.name}
                </button>
              ))}
              <button onClick={() => setShowNewView(true)} style={{ padding:"9px 12px", border:"none", background:"transparent", borderBottom:"2px solid transparent", fontSize:13, color:"var(--text-muted)", cursor:"pointer", whiteSpace:"nowrap", marginBottom:-1 }}>+ New View</button>
            </div>
          </div>

          {/* List View Tabs */}
          <div style={{ display:"flex", gap:6, padding:"10px 24px 0", borderBottom:"1px solid var(--border)", overflowX:"auto", flexShrink:0 }}>
            {[
              { key:"all",      label:"All Churches" },
              { key:"visited",  label:"Visited" },
              { key:"strong",   label:"Strong" },
              { key:"weak",     label:"Weak Standing" },
              { key:"no_power", label:"No Power" },
            ].map(v => (
              <button key={v.key} onClick={() => { setListView(v.key); setPage(1); }}
                style={{ padding:"7px 14px", borderRadius:"8px 8px 0 0", border:"1px solid", borderBottom:"none", fontSize:13, fontWeight:500, cursor:"pointer",
                  borderColor: listView===v.key ? "var(--border-strong)" : "transparent",
                  background: listView===v.key ? "var(--surface)" : "transparent",
                  color: listView===v.key ? "var(--text)" : "var(--text-muted)"
                }}>
                {v.label}{listView===v.key ? ` (${filtered2.length})` : ""}
              </button>
            ))}
          </div>

          {/* Search + toolbar */}
          <div style={{ padding:"12px 24px", display:"flex", gap:8, alignItems:"center", borderBottom:"1px solid var(--border)", flexShrink:0, flexWrap:"wrap" }}>
            <div style={{ position:"relative", flex:1, minWidth:200 }}>
              <svg style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", pointerEvents:"none" }} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" placeholder="Search member name, church, location…" value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} style={{ paddingLeft:34, fontSize:13, padding:"8px 13px 8px 34px", width:"100%", boxSizing:"border-box" }} />
            </div>
            <button onClick={() => setShowFilters(f=>!f)} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", border:"1px solid", borderRadius:9, fontSize:13, fontWeight:500, cursor:"pointer", transition:"all 0.15s", borderColor:Object.values(filters).some(Boolean)?"var(--accent)":"var(--border-strong)", background:Object.values(filters).some(Boolean)?"rgba(0,122,255,0.07)":"var(--surface)", color:Object.values(filters).some(Boolean)?"var(--accent)":"var(--text-secondary)" }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
              Filters {Object.values(filters).filter(Boolean).length > 0 && <span style={{ background:"var(--accent)", color:"#fff", borderRadius:100, fontSize:10, fontWeight:700, padding:"1px 6px" }}>{Object.values(filters).filter(Boolean).length}</span>}
            </button>
            {/* Column picker button */}
            <div style={{ position:"relative" }}>
              <button onClick={() => setShowColPicker(s=>!s)} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:9, fontSize:13, fontWeight:500, cursor:"pointer", color:"var(--text-secondary)" }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
                Columns
              </button>
              {showColPicker && (
                <div style={{ position:"absolute", top:"calc(100% + 6px)", right:0, background:"var(--surface)", border:"1px solid var(--border-strong)", borderRadius:14, padding:16, boxShadow:"var(--shadow-lg)", zIndex:200, minWidth:180 }} onClick={e=>e.stopPropagation()}>
                  <div style={{ fontSize:13, fontWeight:700, marginBottom:4, color:"var(--text)" }}>Show / Hide Columns</div>
                  <div style={{ fontSize:11, color:"var(--text-muted)", marginBottom:10 }}>Drag to reorder</div>
                  {colOrder.map(key => {
                    const col = ALL_COLS.find(c => c.key === key);
                    if (!col || !col.label) return null;
                    return (
                      <div
                        key={col.key}
                        draggable
                        onDragStart={() => { dragItem.current = key; }}
                        onDragEnter={() => { dragOver.current = key; }}
                        onDragEnd={() => {
                          if (!dragItem.current || !dragOver.current || dragItem.current === dragOver.current) return;
                          const next = [...colOrder];
                          const fi = next.indexOf(dragItem.current); const ti = next.indexOf(dragOver.current);
                          next.splice(fi, 1); next.splice(ti, 0, dragItem.current);
                          setColOrder(next); dragItem.current = null; dragOver.current = null;
                        }}
                        onDragOver={e => e.preventDefault()}
                        style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 0", cursor:"grab", userSelect:"none" }}
                      >
                        <svg width="12" height="14" viewBox="0 0 12 14" fill="none" style={{ flexShrink:0, opacity:0.35 }}>
                          <circle cx="3" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="2" r="1.5" fill="currentColor"/>
                          <circle cx="3" cy="7" r="1.5" fill="currentColor"/><circle cx="9" cy="7" r="1.5" fill="currentColor"/>
                          <circle cx="3" cy="12" r="1.5" fill="currentColor"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/>
                        </svg>
                        <label style={{ display:"flex", alignItems:"center", gap:8, fontSize:13, cursor:"pointer", flex:1, color:"var(--text)" }} onClick={e => e.stopPropagation()}>
                          <input type="checkbox"
                            checked={visibleOptional.includes(col.key)}
                            onChange={e => setVisibleOptional(vc => e.target.checked ? [...vc, col.key] : vc.filter(k=>k!==col.key))}
                          />
                          {col.label}
                        </label>
                      </div>
                    );
                  })}
                  <button onClick={() => { localStorage.setItem('ea_visible_cols', JSON.stringify(visibleOptional)); localStorage.setItem('ea_col_order', JSON.stringify(colOrder)); setShowColPicker(false); }} style={{ marginTop:12, width:"100%", padding:"8px", border:"none", background:"var(--accent)", borderRadius:8, fontSize:13, fontWeight:600, cursor:"pointer", color:"#fff" }}>Save as Default</button>
                  <button onClick={() => setShowColPicker(false)} style={{ marginTop:6, width:"100%", padding:"7px", border:"none", background:"var(--surface3)", borderRadius:8, fontSize:13, cursor:"pointer" }}>Done</button>
                </div>
              )}
            </div>
            <div style={{ fontSize:13, color:"var(--text-muted)", whiteSpace:"nowrap" }}>
              {filtered2.length} of {churches.length}
            </div>
          </div>

          {/* Filter sidebar + table OR Record Page */}
          {recordView ? (
            <div style={{ flex:1, overflowY:"auto", padding:"0 0 48px" }}>
              {/* Header bar */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 24px", borderBottom:"1px solid var(--border)", background:"var(--surface)", position:"sticky", top:0, zIndex:10 }}>
                <button onClick={() => { setRecordView(null); setChurchVisits([]); setShowVisitForm(false); }}
                  style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 12px", border:"1px solid var(--border-strong)", borderRadius:8, background:"var(--surface2)", cursor:"pointer", fontSize:13, fontWeight:500, color:"var(--text-secondary)" }}>
                  ← Churches
                </button>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={e => openEdit(recordView, e)}
                    style={{ padding:"7px 14px", border:"1px solid var(--border-strong)", borderRadius:8, background:"var(--surface2)", cursor:"pointer", fontSize:13, fontWeight:500, color:"var(--text)" }}>
                    Edit
                  </button>
                  <button onClick={() => setShowVisitForm(true)}
                    style={{ padding:"7px 14px", border:"none", borderRadius:8, background:"var(--accent)", cursor:"pointer", fontSize:13, fontWeight:600, color:"#fff" }}>
                    Log Visit
                  </button>
                </div>
              </div>

              {/* Record title */}
              <div style={{ padding:"20px 24px 16px", borderBottom:"1px solid var(--border)" }}>
                <div style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.02em" }}>{recordView.pastor || recordView.location}</div>
                <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:4 }}>
                  {[recordView.location, recordView.region, recordView.country, recordView.distKampala ? recordView.distKampala+" from Kampala" : null].filter(Boolean).join(" · ")}
                </div>
                {recordView.spiritual_standing && (
                  <span style={{ display:"inline-block", marginTop:8, padding:"3px 12px", borderRadius:100, fontSize:12, fontWeight:600,
                    background: recordView.spiritual_standing==="STRONG"?"rgba(52,199,89,0.12)":recordView.spiritual_standing==="Weak"?"rgba(255,59,48,0.12)":"rgba(0,122,255,0.1)",
                    color: recordView.spiritual_standing==="STRONG"?"var(--success)":recordView.spiritual_standing==="Weak"?"var(--danger)":"var(--accent)"
                  }}>{recordView.spiritual_standing}</span>
                )}
              </div>

              {/* Two-column: Contact + Church Info */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24, padding:"20px 24px" }}>
                {/* Contact */}
                <div>
                  <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em", marginBottom:10 }}>Contact</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {[["Church Name",recordView.church_name],["Phone",recordView.phone],["WhatsApp",recordView.whatsapp],["Email",recordView.email]].filter(([,v])=>v).map(([k,v])=>(
                      <div key={k} style={{ padding:"10px 14px", background:"var(--surface2)", borderRadius:10, border:"1px solid var(--border)" }}>
                        <div style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:3 }}>{k}</div>
                        <div style={{ fontSize:14, fontWeight:500 }}>{v}</div>
                      </div>
                    ))}
                    {![recordView.church_name,recordView.phone,recordView.whatsapp,recordView.email].some(Boolean) && (
                      <div style={{ color:"var(--text-muted)", fontSize:13, padding:"8px 0" }}>No contact info recorded.</div>
                    )}
                  </div>
                </div>

                {/* Church Info */}
                <div>
                  <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em", marginBottom:10 }}>Church Info</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    {[["Region",recordView.region],["Country",recordView.country],["Members",recordView.members],["Language",recordView.language],["Building",recordView.bldg_type],["Score",recordView.priority],["Deploy Order",recordView.deploy_order]].filter(([,v])=>v).map(([k,v])=>(
                      <div key={k} style={{ padding:"9px 12px", background:"var(--surface2)", borderRadius:9, border:"1px solid var(--border)" }}>
                        <div style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:3 }}>{k}</div>
                        <div style={{ fontSize:13, fontWeight:500 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Infrastructure */}
              <div style={{ padding:"0 24px 20px" }}>
                <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em", marginBottom:10 }}>Infrastructure</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))", gap:8 }}>
                  {[["Internet",recordView.internet],["Cell Signal",recordView.cell_signal],["Cell Quality",recordView.cell_quality],["Cell Phone",recordView.cell_phone],["Tablet",recordView.tablet],["Electric Power",recordView.elect_power],["Laptop",recordView.laptop],["Sound System",recordView.sound_system],["TV Screen",recordView.tv_screen]].map(([k,v])=>{
                    const isYes=v==="Available"||v==="Yes"||v==="Strong", isNo=v==="Not Available"||v==="No"||v==="None"||v==="Weak";
                    return (
                      <div key={k} style={{ padding:"9px 12px", background:"var(--surface2)", borderRadius:9, border:"1px solid var(--border)" }}>
                        <div style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:3 }}>{k}</div>
                        <div style={{ fontSize:12, fontWeight:600, color:isYes?"var(--success)":isNo?"var(--danger)":"var(--text-muted)" }}>{v||"—"}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Visit History */}
              <div style={{ padding:"0 24px 24px" }}>
                <div style={{ borderTop:"1px solid var(--border)", paddingTop:16 }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                    <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em" }}>Visit History</div>
                    <button onClick={() => setShowVisitForm(v=>!v)} style={{ padding:"5px 12px", background:"rgba(0,122,255,0.09)", border:"1px solid rgba(0,122,255,0.2)", borderRadius:8, fontSize:12, fontWeight:600, color:"var(--accent)", cursor:"pointer" }}>
                      {showVisitForm ? "Cancel" : "+ Log a Visit"}
                    </button>
                  </div>
                  {showVisitForm && (
                    <div style={{ background:"var(--surface2)", borderRadius:12, padding:16, marginBottom:14, border:"1px solid var(--border)" }}>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
                        <div className="field-group">
                          <div className="field-label">Visit Date *</div>
                          <input type="date" value={visitForm.visit_date} onChange={e=>setVisitForm(f=>({...f,visit_date:e.target.value}))} />
                        </div>
                        <div className="field-group">
                          <div className="field-label">Submitted By *</div>
                          <input type="text" placeholder="Your name" value={visitForm.submitted_by} onChange={e=>setVisitForm(f=>({...f,submitted_by:e.target.value}))} />
                        </div>
                        <div className="field-group">
                          <div className="field-label">Visitors (names)</div>
                          <input type="text" placeholder="e.g. Isaac, Daniel" value={visitForm.visitors} onChange={e=>setVisitForm(f=>({...f,visitors:e.target.value}))} />
                        </div>
                        <div className="field-group">
                          <div className="field-label">Attendees</div>
                          <input type="number" min="0" placeholder="0" value={visitForm.attendees} onChange={e=>setVisitForm(f=>({...f,attendees:e.target.value}))} />
                        </div>
                        <div className="field-group">
                          <div className="field-label">Smartphones Present</div>
                          <input type="number" min="0" placeholder="0" value={visitForm.smartphones} onChange={e=>setVisitForm(f=>({...f,smartphones:e.target.value}))} />
                        </div>
                        <div className="field-group" style={{ display:"flex", alignItems:"center", gap:10, paddingTop:20 }}>
                          <input type="checkbox" id="tc_rec" checked={visitForm.training_completed} onChange={e=>setVisitForm(f=>({...f,training_completed:e.target.checked}))} style={{ width:16, height:16 }} />
                          <label htmlFor="tc_rec" style={{ fontSize:13, cursor:"pointer" }}>Training completed</label>
                        </div>
                      </div>
                      <div className="field-group" style={{ marginBottom:10 }}>
                        <div className="field-label">Challenges</div>
                        <textarea placeholder="Any challenges or blockers?" value={visitForm.challenges} onChange={e=>setVisitForm(f=>({...f,challenges:e.target.value}))} style={{ minHeight:60 }} />
                      </div>
                      <div className="field-group" style={{ marginBottom:12 }}>
                        <div className="field-label">Notes</div>
                        <textarea placeholder="General observations, next steps…" value={visitForm.notes} onChange={e=>setVisitForm(f=>({...f,notes:e.target.value}))} style={{ minHeight:60 }} />
                      </div>
                      <button onClick={saveVisitFromRecord} disabled={savingVisit} className="btn-next" style={{ width:"100%" }}>
                        {savingVisit ? "Saving…" : "Save Visit"}
                      </button>
                    </div>
                  )}
                  {visitLoading ? (
                    <div style={{ color:"var(--text-muted)", fontSize:13, padding:"8px 0" }}>Loading visits…</div>
                  ) : churchVisits.length === 0 ? (
                    <div style={{ color:"var(--text-muted)", fontSize:13, padding:"8px 0" }}>No visits logged yet.</div>
                  ) : (
                    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                      {churchVisits.map(v => (
                        <div key={v.id} style={{ background:"var(--surface2)", borderRadius:10, padding:"12px 14px", border:"1px solid var(--border)" }}>
                          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                            <div style={{ fontWeight:600, fontSize:13 }}>{v.visit_date}</div>
                            <div style={{ fontSize:11, color:"var(--text-muted)" }}>by {v.submitted_by}</div>
                          </div>
                          {v.visitors && <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:2 }}>Team: {v.visitors}</div>}
                          <div style={{ fontSize:12, color:"var(--text-muted)", display:"flex", gap:12, flexWrap:"wrap" }}>
                            {v.attendees != null && <span>Attendees: <strong>{v.attendees}</strong></span>}
                            {v.smartphones != null && <span>Smartphones: <strong>{v.smartphones}</strong></span>}
                            {v.training_completed && <span style={{ color:"var(--success)", fontWeight:600 }}>Training Done</span>}
                          </div>
                          {v.challenges && <div style={{ fontSize:12, color:"var(--danger)", marginTop:4 }}>Challenges: {v.challenges}</div>}
                          {v.notes && <div style={{ fontSize:12, color:"var(--text-secondary)", marginTop:4 }}>{v.notes}</div>}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          ) : (
          <div style={{ display:"flex", flex:1, minHeight:0, overflow:"hidden" }}>

            {/* Filter panel */}
            {showFilters && (
              <div style={{ width:220, flexShrink:0, borderRight:"1px solid var(--border)", padding:"16px", overflowY:"auto", background:"var(--surface2)" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
                  <div style={{ fontSize:13, fontWeight:700 }}>Filters</div>
                  <button onClick={() => { setFilters({}); setPage(1); setActiveView("all"); }} style={{ fontSize:11, color:"var(--accent)", border:"none", background:"transparent", cursor:"pointer", fontWeight:500 }}>Clear all</button>
                </div>
                {[
                  { label:"Country",  key:"country",  opts:["", ...uniqueCountries] },
                  { label:"Region",   key:"region",   opts:["", ...uniqueRegions]   },
                  { label:"Standing", key:"standing",  opts:["","STRONG","Stable","Growing","Weak"] },
                  { label:"Internet", key:"internet",  opts:["","Available","Not Available","Unknown"] },
                ].map(({label,key,opts}) => (
                  <div key={key} style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:6 }}>{label}</div>
                    <select value={filters[key]||""} onChange={e => { setFilters(f=>({...f,[key]:e.target.value||undefined})); setPage(1); }} style={{ fontSize:13, padding:"7px 10px", width:"100%" }}>
                      {opts.map(o=><option key={o} value={o}>{o||`All ${label}s`}</option>)}
                    </select>
                  </div>
                ))}
                <div style={{ marginBottom:14 }}>
                  <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:6 }}>Min Members</div>
                  <input type="number" placeholder="e.g. 50" value={filters.minMembers||""} onChange={e => { setFilters(f=>({...f,minMembers:e.target.value||undefined})); setPage(1); }} style={{ fontSize:13, padding:"7px 10px", width:"100%", boxSizing:"border-box" }} />
                </div>
                <label style={{ display:"flex", alignItems:"center", gap:8, fontSize:13, cursor:"pointer", marginBottom:16 }}>
                  <input type="checkbox" checked={!!filters.hasDeployOrder} onChange={e => { setFilters(f=>({...f,hasDeployOrder:e.target.checked||undefined})); setPage(1); }} />
                  Deploy order set
                </label>
                <button onClick={() => setShowNewView(true)} style={{ width:"100%", padding:"9px", border:"1px solid var(--accent)", background:"rgba(0,122,255,0.07)", borderRadius:9, fontSize:13, fontWeight:600, color:"var(--accent)", cursor:"pointer" }}>Save as View…</button>
              </div>
            )}

            {/* Table */}
            <div style={{ flex:1, overflowX:"auto", overflowY:"auto" }}>
              <div style={{ padding:"6px 24px", fontSize:12, color:"var(--text-muted)", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", flexShrink:0 }}>
                <span style={{ fontWeight:600, color:"var(--text-secondary)" }}>{filtered2.length}</span> churches
                <span>·</span>
                <span>Sorted by {ALL_COLS.find(c=>c.key===sortCol)?.label || sortCol} {sortDir==="asc"?"↑":"↓"}</span>
                {Object.entries(filters).filter(([,v])=>v).map(([k,v]) => (
                  <span key={k} style={{ background:"rgba(0,122,255,0.1)", color:"var(--accent)", borderRadius:100, padding:"2px 8px", fontSize:11, fontWeight:600 }}>
                    {k}: {v} <span onClick={()=>setFilters(f=>({...f,[k]:""}))} style={{ cursor:"pointer", marginLeft:2 }}>×</span>
                  </span>
                ))}
              </div>
              <table className="responses-table" style={{ borderRadius:0, tableLayout:"fixed" }}>
                <colgroup>
                  {shownCols.map(col => <col key={col.key} style={{ width:col.w }} />)}
                </colgroup>
                <thead style={{ position:"sticky", top:0, zIndex:10 }}>
                  <tr>
                    {shownCols.map(col => (
                      <th key={col.key}
                        style={{ cursor: col.key.startsWith("_") ? "default" : "pointer", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", userSelect:"none" }}
                        onClick={() => !col.key.startsWith("_") && toggleSort(col.key)}
                      >
                        {col.label}{sortCol === col.key ? (sortDir === "asc" ? " ↑" : " ↓") : ""}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {pageRows.map(c => {
                    return (
                      <tr key={c.id} onClick={() => { setRecordView(c); loadVisitsForChurch(c.id); }} style={{ cursor:"pointer" }}>
                        {shownCols.map(col => renderCell(col, c))}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {pageRows.length===0 && <div style={{ padding:"60px 24px", textAlign:"center", color:"var(--text-muted)", fontSize:14 }}>No churches match your filters.</div>}
            </div>
          </div>

          )} {/* end recordView ternary */}

          {/* Pagination */}
          <div style={{ padding:"10px 24px", borderTop:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0, flexWrap:"wrap", gap:10, background:"var(--surface)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:12, color:"var(--text-muted)" }}>Rows:</span>
              {[10,25,50].map(n => (
                <button key={n} onClick={() => { setPageSize(n); setPage(1); }} style={{ padding:"3px 9px", borderRadius:7, border:"1px solid", fontSize:12, cursor:"pointer", borderColor:pageSize===n?"var(--accent)":"var(--border-strong)", background:pageSize===n?"rgba(0,122,255,0.09)":"transparent", color:pageSize===n?"var(--accent)":"var(--text-muted)", fontWeight:pageSize===n?600:400 }}>{n}</button>
              ))}
            </div>
            <div style={{ fontSize:12, color:"var(--text-muted)" }}>
              {sorted.length === 0 ? "0 results" : `${(page-1)*pageSize+1}–${Math.min(page*pageSize,sorted.length)} of ${sorted.length}`}
            </div>
            <div style={{ display:"flex", gap:4 }}>
              {[["«",()=>setPage(1)],["‹",()=>setPage(p=>Math.max(1,p-1))],["›",()=>setPage(p=>Math.min(totalPages,p+1))],["»",()=>setPage(totalPages)]].map(([lbl,fn],i) => (
                <button key={i} onClick={fn} style={{ padding:"4px 9px", borderRadius:7, border:"1px solid var(--border-strong)", background:"var(--surface2)", fontSize:12, cursor:"pointer", color:"var(--text-muted)" }}>{lbl}</button>
              ))}
            </div>
          </div>

          {/* Detail modal */}
          {selected && !editing && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }} onClick={() => setSelected(null)}>
              <div style={{ background:"var(--surface)", borderRadius:20, padding:24, maxWidth:520, width:"100%", boxShadow:"var(--shadow-lg)", maxHeight:"90vh", overflowY:"auto" }} onClick={e=>e.stopPropagation()}>
                <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:18 }}>
                  <div>
                    <div style={{ fontSize:17, fontWeight:700 }}>{selected.pastor}</div>
                    <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:3 }}>{selected.church_name||selected.location}</div>
                  </div>
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={e=>openEdit(selected,e)} style={{ border:"1px solid var(--border-strong)", background:"var(--surface2)", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:13, fontWeight:500 }}>Edit</button>
                    <button onClick={() => setSelected(null)} style={{ border:"none", background:"var(--surface3)", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:13, color:"var(--text-muted)" }}>✕</button>
                  </div>
                </div>
                {(selected.phone||selected.whatsapp||selected.email||selected.church_name) && <>
                  <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em", marginBottom:8 }}>Contact</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
                    {[["Church",selected.church_name],["Phone",selected.phone],["WhatsApp",selected.whatsapp],["Email",selected.email]].filter(([,v])=>v).map(([k,v])=>(
                      <div key={k} style={{ padding:"9px 12px", background:"var(--surface2)", borderRadius:9, border:"1px solid var(--border)" }}>
                        <div style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:3 }}>{k}</div>
                        <div style={{ fontSize:13, fontWeight:500 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </>}
                <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em", marginBottom:8 }}>Church Info</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
                  {[["Region",selected.region],["Country",selected.country],["Members",selected.members||"—"],["Standing",selected.standing||"—"],["Spiritual Standing",selected.spiritual_standing||"—"],["Language",selected.language||"—"],["Building Type",selected.bldg_type||"—"],["From Kampala",selected.distKampala||"—"],["Score",selected.priority||"—"],["Deploy Order",selected.deploy_order||"Not set"]].map(([k,v])=>(
                    <div key={k} style={{ padding:"9px 12px", background:"var(--surface2)", borderRadius:9, border:"1px solid var(--border)" }}>
                      <div style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:3 }}>{k}</div>
                      <div style={{ fontSize:13, fontWeight:500 }}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.06em", marginBottom:8 }}>Infrastructure</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
                  {[["Internet",selected.internet],["Cell Signal",selected.cell_signal],["Cell Quality",selected.cell_quality],["Cell Phone",selected.cell_phone],["Tablet",selected.tablet],["Electric Power",selected.elect_power],["Laptop",selected.laptop],["Sound System",selected.sound_system],["TV Screen",selected.tv_screen]].map(([k,v])=>{
                    const isYes=v==="Available"||v==="Yes"||v==="Strong", isNo=v==="Not Available"||v==="No"||v==="None"||v==="Weak";
                    return (
                      <div key={k} style={{ padding:"9px 12px", background:"var(--surface2)", borderRadius:9, border:"1px solid var(--border)" }}>
                        <div style={{ fontSize:10, fontWeight:600, textTransform:"uppercase", color:"var(--text-muted)", letterSpacing:"0.04em", marginBottom:3 }}>{k}</div>
                        <div style={{ fontSize:12, fontWeight:600, color:isYes?"var(--success)":isNo?"var(--danger)":"var(--text-muted)" }}>{v||"—"}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* Confirm Delete modal */}
          {confirmDelete && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300, padding:16 }} onClick={() => setConfirmDelete(null)}>
              <div style={{ background:"var(--surface)", borderRadius:16, padding:24, maxWidth:380, width:"100%", boxShadow:"var(--shadow-lg)" }} onClick={e=>e.stopPropagation()}>
                <div style={{ fontSize:16, fontWeight:700, marginBottom:8 }}>Delete Church?</div>
                <div style={{ fontSize:13, color:"var(--text-muted)", marginBottom:20 }}>This cannot be undone. The church record will be permanently removed.</div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => setConfirmDelete(null)} style={{ flex:1, padding:"10px", border:"1px solid var(--border-strong)", background:"var(--surface2)", borderRadius:9, fontSize:13, cursor:"pointer" }}>Cancel</button>
                  <button onClick={() => { const c = churches.find(x=>x.id===confirmDelete); if (c) onUpdate({...c,_delete:true}); setConfirmDelete(null); }} style={{ flex:1, padding:"10px", border:"none", background:"var(--danger)", color:"#fff", borderRadius:9, fontSize:13, fontWeight:600, cursor:"pointer" }}>Delete</button>
                </div>
              </div>
            </div>
          )}

          {/* Edit modal */}
          {editing && editData && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }} onClick={() => setEditing(false)}>
              <div style={{ background:"var(--surface)", borderRadius:20, padding:28, maxWidth:720, width:"100%", boxShadow:"var(--shadow-lg)", maxHeight:"90vh", overflowY:"auto" }} onClick={e=>e.stopPropagation()}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
                  <div style={{ fontSize:17, fontWeight:700 }}>Edit Church</div>
                  <button onClick={() => setEditing(false)} style={{ border:"none", background:"var(--surface3)", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:13, color:"var(--text-muted)" }}>✕</button>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:16 }}>
                  {FIELDS.map(([label,key,type]) => (
                    <div key={key} className="field-group">
                      <div className="field-label">{label}</div>
                      <input type={type} value={editData[key]||""} onChange={e=>setEditData(d=>({...d,[key]:e.target.value}))} />
                    </div>
                  ))}
                  <div className="field-group">
                    <div className="field-label">Spiritual Standing</div>
                    <select value={editData.spiritual_standing||""} onChange={e=>setEditData(d=>({...d,spiritual_standing:e.target.value,standing:e.target.value}))}>
                      {["STRONG","Stable","Growing","Weak",""].map(s=><option key={s} value={s}>{s||"(none)"}</option>)}
                    </select>
                  </div>
                  <div className="field-group">
                    <div className="field-label">Country</div>
