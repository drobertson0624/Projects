            </div>
          )}

          {/* Save view modal */}
          {showNewView && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300, padding:16 }} onClick={() => setShowNewView(false)}>
              <div style={{ background:"var(--surface)", borderRadius:16, padding:24, maxWidth:340, width:"100%", boxShadow:"var(--shadow-lg)" }} onClick={e=>e.stopPropagation()}>
                <div style={{ fontSize:16, fontWeight:700, marginBottom:14 }}>Save as View</div>
                <div className="field-group" style={{ marginBottom:14 }}>
                  <div className="field-label">View Name</div>
                  <input type="text" placeholder="e.g. Kenya Churches" value={newViewName} onChange={e=>setNewViewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveView()} autoFocus />
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button className="btn-back" onClick={() => setShowNewView(false)} style={{ flex:1 }}>Cancel</button>
                  <button className="btn-next" onClick={saveView} disabled={!newViewName.trim()}>Save View</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }



    // ─── Church Map (Leaflet) ────────────────────────────────────────────────
    function ChurchMap({ churches }) {
      const mapRef      = React.useRef(null);
      const leafletMap  = React.useRef(null);
      const markersRef  = React.useRef([]);
      const rallyLayerRef = React.useRef([]);
      const [viewMode, setViewMode] = useState("map");
      const [mapReady, setMapReady] = useState(false);

      // Rally points state — load from Supabase, fall back to defaults
      const [rallyPoints, setRallyPoints] = useState([
        { id:"default-bomet",  name:"Bomet",  lat:-0.7820, lng:35.3420, radiusMiles:50, color:"#87CEEB" },
        { id:"default-nakuru", name:"Nakuru", lat:-0.3031, lng:36.0800, radiusMiles:50, color:"#9B59B6" },
      ]);
      const [rallyLoaded, setRallyLoaded] = useState(false);

      // Load from Supabase once
      React.useEffect(() => {
        fetchRallyPoints().then(rows => {
          if (rows) setRallyPoints(rows);
          setRallyLoaded(true);
        });
      }, []);
      const [showRallyPanel, setShowRallyPanel] = useState(false);
      const [editingRally, setEditingRally]     = useState(null);
      const [newRally, setNewRally]             = useState({ name:"", city:"", country:"Kenya", radiusMiles:50, color:"#87CEEB" });
      const [showAddRally, setShowAddRally]     = useState(false);
      const [rallyGeocoding, setRallyGeocoding] = useState(false);
      const [rallyGeoError, setRallyGeoError]   = useState("");

      const MILES_TO_METERS = 1609.34;
      const RALLY_COLORS = ["#87CEEB","#9B59B6","#E74C3C","#27AE60","#F39C12","#1ABC9C","#2980B9","#E91E63"];

      const byRegion = {};
      churches.forEach(c => {
        if (!byRegion[c.region]) byRegion[c.region] = { count:0, members:0, churches:[] };
        byRegion[c.region].count++;
        byRegion[c.region].members += c.members||0;
        byRegion[c.region].churches.push(c);
      });

      const sCol = s => s==="STRONG"?"#34C759":s==="Growing"?"#FF9500":"#007AFF";

      // Add CSS for pulse animation once
      React.useEffect(() => {
        if (!document.getElementById('rally-pulse-css')) {
          const style = document.createElement('style');
          style.id = 'rally-pulse-css';
          style.textContent = `
            @keyframes rallyPulse {
              0%   { transform:scale(1);   opacity:0.8; }
              50%  { transform:scale(1.6); opacity:0.3; }
              100% { transform:scale(1);   opacity:0.8; }
            }
            .rally-beacon { animation: rallyPulse 2s ease-in-out infinite; }
            .rally-beacon-2 { animation: rallyPulse 2s ease-in-out infinite 0.6s; }
            .rally-beacon-3 { animation: rallyPulse 2s ease-in-out infinite 1.2s; }
          `;
          document.head.appendChild(style);
        }
      }, []);

      // Draw rally points on the map
      const drawRallyPoints = React.useCallback((map) => {
        // Clear existing rally layers
        rallyLayerRef.current.forEach(l => { try { map.removeLayer(l); } catch(e) {} });
        rallyLayerRef.current = [];

        rallyPoints.forEach(rp => {
          // Radius circle
          const circle = window.L.circle([rp.lat, rp.lng], {
            radius: rp.radiusMiles * MILES_TO_METERS,
            color: rp.color,
            fillColor: rp.color,
            fillOpacity: 0.07,
            weight: 2,
            dashArray: "6 4",
          });
          circle.addTo(map);
          rallyLayerRef.current.push(circle);

          // Pulsing beacon icon
          const beacon = window.L.divIcon({
            className: '',
            html: `<div style="position:relative;width:40px;height:40px;transform:translate(-50%,-50%)">
              <div class="rally-beacon" style="position:absolute;inset:0;border-radius:50%;background:${rp.color};opacity:0.25;"></div>
              <div class="rally-beacon-2" style="position:absolute;inset:6px;border-radius:50%;background:${rp.color};opacity:0.35;"></div>
              <div style="position:absolute;inset:12px;border-radius:50%;background:${rp.color};box-shadow:0 0 12px ${rp.color}88;display:flex;align-items:center;justify-content:center;">
                <div style="width:6px;height:6px;border-radius:50%;background:white;"></div>
              </div>
            </div>`,
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, -24],
          });

          const marker = window.L.marker([rp.lat, rp.lng], { icon: beacon });
          marker.bindPopup(`
            <div style="font-family:-apple-system,sans-serif;min-width:180px;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                <div style="width:10px;height:10px;border-radius:50%;background:${rp.color};flex-shrink:0;"></div>
                <div style="font-size:15px;font-weight:700;color:#1d1d1f;">Rally Point: ${rp.name}</div>
              </div>
              <div style="padding:8px;background:#f7f7f7;border-radius:8px;font-size:13px;color:#444;">
                <div style="margin-bottom:4px;"><strong>Radius:</strong> ${rp.radiusMiles} miles</div>
                <div><strong>Coords:</strong> ${rp.lat.toFixed(4)}, ${rp.lng.toFixed(4)}</div>
              </div>
            </div>
          `, { maxWidth: 220 });
          marker.addTo(map);
          rallyLayerRef.current.push(marker);
        });
      }, [rallyPoints]);

      React.useEffect(() => {
        if (viewMode !== "map") return;
        if (!window.L) { setMapReady(false); return; }

        setTimeout(() => {
          if (!mapRef.current) return;
          if (leafletMap.current) { leafletMap.current.remove(); leafletMap.current = null; }

          const map = window.L.map(mapRef.current, { center:[0.5, 33.5], zoom:7, zoomControl:true, scrollWheelZoom:true });
          leafletMap.current = map;

          const street    = window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:18 });
          const satellite = window.L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:18 });
          const terrain   = window.L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution:'© OpenTopoMap', maxZoom:17 });
          street.addTo(map);
          window.L.control.layers({ "Street":street, "Satellite":satellite, "Terrain":terrain }, {}, { position:'topright' }).addTo(map);

          // Church pins
          markersRef.current.forEach(m => map.removeLayer(m));
          markersRef.current = [];
          churches.filter(c => c.lat && c.lng).forEach(c => {
            const col = sCol(c.standing);
            const r   = Math.max(8, Math.min(20, 8 + ((c.members||0)/220)*12));
            const icon = window.L.divIcon({
              className:'',
              html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${col};border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:${r>13?'9':'0'}px;font-weight:700;color:white;cursor:pointer;">${c.members>80?c.members:""}</div>`,
              iconSize:[r*2,r*2], iconAnchor:[r,r], popupAnchor:[0,-r-4],
            });
            const marker = window.L.marker([c.lat,c.lng], {icon});
            marker.bindPopup(`<div style="font-family:-apple-system,sans-serif;min-width:200px;"><div style="font-size:14px;font-weight:700;color:#1d1d1f;margin-bottom:4px;">${c.pastor}</div><div style="font-size:12px;color:#86868b;margin-bottom:10px;">${c.location}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;"><div style="padding:7px 9px;background:#f7f7f7;border-radius:7px;"><div style="font-size:10px;font-weight:600;color:#86868b;text-transform:uppercase;margin-bottom:2px;">Members</div><div style="font-size:14px;font-weight:700;color:#007AFF;">${c.members||"?"}</div></div><div style="padding:7px 9px;background:#f7f7f7;border-radius:7px;"><div style="font-size:10px;font-weight:600;color:#86868b;text-transform:uppercase;margin-bottom:2px;">Standing</div><div style="font-size:12px;font-weight:600;color:${col};">${c.standing||"—"}</div></div><div style="padding:7px 9px;background:#f7f7f7;border-radius:7px;"><div style="font-size:10px;font-weight:600;color:#86868b;text-transform:uppercase;margin-bottom:2px;">Region</div><div style="font-size:12px;font-weight:500;color:#1d1d1f;">${c.region}</div></div><div style="padding:7px 9px;background:#f7f7f7;border-radius:7px;"><div style="font-size:10px;font-weight:600;color:#86868b;text-transform:uppercase;margin-bottom:2px;">Country</div><div style="font-size:12px;font-weight:500;color:#1d1d1f;">${c.country}</div></div></div></div>`, {maxWidth:260});
            marker.addTo(map);
            markersRef.current.push(marker);
          });

          drawRallyPoints(map);
          setMapReady(true);
        }, 100);

        return () => { if (leafletMap.current) { leafletMap.current.remove(); leafletMap.current = null; } };
      }, [viewMode, churches]);

      // Redraw rally points when they change without rebuilding the whole map
      React.useEffect(() => {
        if (leafletMap.current && viewMode === "map") {
          drawRallyPoints(leafletMap.current);
        }
      }, [rallyPoints, drawRallyPoints]);

      const updateRally = (id, changes) => {
        setRallyPoints(pts => {
          const updated = pts.map(p => p.id===id ? {...p, ...changes} : p);
          const rp = updated.find(p => p.id===id);
          if (rp) upsertRallyPoint(rp);
          return updated;
        });
      };

      const updateRadius = (id, miles) => {
        updateRally(id, { radiusMiles: Math.max(10, Math.min(500, miles)) });
      };

      return (
        <div style={{ padding:"28px 24px", maxWidth:1080, margin:"0 auto", width:"100%" }}>
          {/* Header */}
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.025em" }}>Church Locations</div>
              <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:3 }}>{churches.length} churches · {rallyPoints.length} rally point{rallyPoints.length!==1?"s":""}</div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setShowRallyPanel(s=>!s)} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", border:`1px solid ${showRallyPanel?"var(--accent)":"var(--border-strong)"}`, background: showRallyPanel?"rgba(0,122,255,0.07)":"var(--surface)", borderRadius:9, fontSize:13, fontWeight:500, cursor:"pointer", color: showRallyPanel?"var(--accent)":"var(--text-secondary)", transition:"all 0.15s" }}>
                <span style={{ fontSize:14 }}>📡</span> Rally Points
              </button>
              <div style={{ display:"flex", gap:2, background:"var(--surface3)", borderRadius:9, padding:3 }}>
                {["map","region"].map(m => (
                  <button key={m} onClick={() => setViewMode(m)} style={{ padding:"5px 16px", borderRadius:7, border:"none", fontSize:13, fontWeight:500, cursor:"pointer", background:viewMode===m?"var(--surface)":"transparent", color:viewMode===m?"var(--text)":"var(--text-muted)", boxShadow:viewMode===m?"var(--shadow-sm)":"none", transition:"all 0.15s" }}>
                    {m==="map"?"Live Map":"By Region"}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Rally Points Panel */}
          {showRallyPanel && (
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:16, padding:20, marginBottom:16, boxShadow:"var(--shadow-sm)" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
                <div style={{ fontSize:15, fontWeight:700 }}>📡 Rally Points</div>
                <button onClick={() => setShowAddRally(true)} className="btn-next" style={{ flex:"none", padding:"7px 16px", fontSize:12 }}>+ Add Rally Point</button>
              </div>

              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {rallyPoints.map(rp => (
                  <div key={rp.id} style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 16px", background:"var(--surface2)", borderRadius:12, border:"1px solid var(--border)", flexWrap:"wrap" }}>
                    {/* Color dot + name */}
                    <div style={{ display:"flex", alignItems:"center", gap:10, minWidth:140 }}>
                      <div style={{ width:14, height:14, borderRadius:"50%", background:rp.color, boxShadow:`0 0 8px ${rp.color}66`, flexShrink:0 }} />
                      <div style={{ fontSize:14, fontWeight:700 }}>{rp.name}</div>
                    </div>

                    {/* Radius slider */}
                    <div style={{ flex:1, minWidth:200 }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                        <span style={{ fontSize:12, color:"var(--text-muted)" }}>Radius</span>
                        <span style={{ fontSize:13, fontWeight:700, color:rp.color }}>{rp.radiusMiles} mi</span>
                      </div>
                      <input type="range" min="10" max="300" step="5" value={rp.radiusMiles}
                        onChange={e => updateRadius(rp.id, Number(e.target.value))}
                        style={{ width:"100%", accentColor:rp.color, cursor:"pointer" }}
                      />
                      <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"var(--text-muted)" }}>
                        <span>10 mi</span><span>300 mi</span>
                      </div>
                    </div>

                    {/* Direct input */}
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <input type="number" min="10" max="500" value={rp.radiusMiles}
                        onChange={e => updateRadius(rp.id, Number(e.target.value))}
                        style={{ width:70, padding:"6px 10px", fontSize:13, fontWeight:600, textAlign:"center", border:"1px solid var(--border-strong)", borderRadius:8 }}
                      />
                      <span style={{ fontSize:12, color:"var(--text-muted)" }}>mi</span>
                    </div>

                    {/* Color picker */}
                    <div style={{ display:"flex", gap:5 }}>
                      {RALLY_COLORS.map(col => (
                        <button key={col} onClick={() => updateRally(rp.id, { color:col })}
                          style={{ width:20, height:20, borderRadius:"50%", background:col, border: rp.color===col?"2px solid #1d1d1f":"2px solid transparent", cursor:"pointer", transition:"transform 0.1s" }} />
                      ))}
                    </div>

                    {/* Edit */}
                    <button onClick={() => setEditingRally({...rp, _city:"", _country:"Kenya"})}
                      style={{ border:"1px solid var(--border-strong)", background:"var(--surface)", color:"var(--text-secondary)", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:500, cursor:"pointer" }}>
                      Edit
                    </button>

                    {/* Remove */}
                    <button onClick={() => { setRallyPoints(pts => pts.filter(p => p.id!==rp.id)); deleteRallyPoint(rp.id); }}
                      style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                      Remove
                    </button>
                  </div>
                ))}
              </div>

              {/* Add Rally Point form */}
              {showAddRally && (
                <div style={{ marginTop:16, padding:18, background:"var(--surface3)", borderRadius:12, border:"1px solid var(--border)" }}>
                  <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>New Rally Point</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
                    <div className="field-group">
                      <div className="field-label">City Name <span style={{ color:"var(--text-muted)", fontWeight:400 }}>(becomes the label)</span></div>
                      <input type="text" placeholder="e.g. Nairobi" value={newRally.city} onChange={e => { setNewRally(p=>({...p, city:e.target.value, name:e.target.value})); setRallyGeoError(""); }} />
                    </div>
                    <div className="field-group">
                      <div className="field-label">Country</div>
                      <select value={newRally.country} onChange={e => setNewRally(p=>({...p,country:e.target.value}))}>
                        {Object.keys(COUNTRIES).filter(c=>c!=="Other").map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div className="field-group">
                      <div className="field-label">Radius (miles)</div>
                      <input type="number" min="10" max="500" value={newRally.radiusMiles} onChange={e => setNewRally(p=>({...p,radiusMiles:Number(e.target.value)}))} />
                    </div>
                    <div className="field-group">
                      <div className="field-label">Color</div>
                      <div style={{ display:"flex", gap:7, marginTop:6 }}>
                        {RALLY_COLORS.map(col => (
                          <button key={col} onClick={() => setNewRally(p=>({...p,color:col}))}
                            style={{ width:26, height:26, borderRadius:"50%", background:col, border: newRally.color===col?"3px solid #1d1d1f":"2px solid transparent", cursor:"pointer" }} />
                        ))}
                      </div>
                    </div>
                  </div>
                  {rallyGeoError && <div style={{ fontSize:12, color:"var(--danger)", marginBottom:10 }}>{rallyGeoError}</div>}
                  <div style={{ display:"flex", gap:8 }}>
                    <button className="btn-back" onClick={() => { setShowAddRally(false); setRallyGeoError(""); }} style={{ flex:1 }}>Cancel</button>
                    <button className="btn-next" disabled={rallyGeocoding || !newRally.city.trim()} onClick={async () => {
                      setRallyGeocoding(true); setRallyGeoError("");
                      // Geocode city + country

    // ─── CSV Export Utilities ──────────────────────────────────────────────────
    function toCSV(rows, headers) {
      const escape = v => {
        if (v == null || v === "") return "";
        const s = String(v).replace(/"/g, '""');
        return /[,"\n\r]/.test(s) ? '"' + s + '"' : s;
      };
      const lines = [
        headers.map(([label]) => escape(label)).join(","),
        ...rows.map(row => headers.map(([, key]) => escape(typeof key === "function" ? key(row) : row[key])).join(","))
      ];
      return lines.join("\r\n");
    }

    function downloadCSV(csv, filename) {
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── Portal Shell ──────────────────────────────────────────────────────────
    // ─── Geocoding ────────────────────────────────────────────────────────────
    async function geocode(church) {
      // Try progressively broader queries until we get a hit
      const queries = [
        [church.location, church.region, church.country],
        [church.church_name, church.region, church.country],
        [church.location, church.country],
        [church.church_name, church.country],
        [church.region, church.country],
        [church.location],
        [church.region],
      ].map(parts => parts.filter(Boolean).join(", ")).filter(q => q.length > 2);

      for (const query of queries) {
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=ug,ke,tz,rw,et,bi,cd,ss,mz,zm,mw,zw`,
            { headers: { "Accept-Language": "en", "User-Agent": "EastAfricaChurchApp/1.0" } }
          );
          const data = await res.json();
          if (data && data[0]) {
            return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
          }
        } catch(e) { console.warn("geocode failed for:", query, e.message); }
        // Small delay between requests to respect rate limits
        await new Promise(r => setTimeout(r, 300));
      }
      return { lat: 0, lng: 0 };
    }

    async function geocodeAndSave(church, onUpdate) {
      if (church.lat && church.lat !== 0) return; // already has coords
      const coords = await geocode(church);
      if (coords.lat !== 0) {
        onUpdate({ ...church, ...coords });
        // Save coords to Supabase
        saveChurchOverride(church.id, { lat: coords.lat, lng: coords.lng });
      }
    }

    async function fetchInventory() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/inventory_items?active=eq.true&order=category,name`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        });
        const rows = await res.json();
        return Array.isArray(rows) ? rows : [];
      } catch(e) { return []; }
    }

    async function saveInventoryItem(item) {
      await fetch(`${SUPABASE_URL}/rest/v1/inventory_items`, {
        method: "POST",
        headers: { "Content-Type":"application/json", apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Prefer:"resolution=merge-duplicates,return=minimal" },
        body: JSON.stringify(item),
      });
    }

    async function deleteInventoryItem(id) {
      await fetch(`${SUPABASE_URL}/rest/v1/inventory_items?id=eq.${id}`, {
        method: "DELETE",
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
      });
    }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
        method: "POST",
        headers: { "Content-Type":"application/json", apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Prefer:"return=representation" },
        body: JSON.stringify({ ...orderData, order_number: "" }),
      });
      const rows = await res.json();
      return Array.isArray(rows) ? rows[0] : rows;
    }

    async function fetchOrders() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        });
        const rows = await res.json();
        return Array.isArray(rows) ? rows : [];
      } catch(e) { return []; }
    }

                        <span style={{ fontSize:14, fontWeight:700, minWidth:20, textAlign:"center" }}>{item.qty}</span>
                        <button onClick={() => changeQty(item.id, item.qty + 1)} style={{ width:26, height:26, borderRadius:6, border:"1px solid var(--border-strong)", background:"var(--surface)", cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
                        <button onClick={() => removeItem(item.id)} style={{ border:"none", background:"transparent", cursor:"pointer", color:"var(--danger)", padding:"0 4px", fontSize:16 }}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Notes */}
            <div className="field-group" style={{ marginBottom:20 }}>
              <div className="field-label">Order Notes (optional)</div>
              <textarea placeholder="Any special instructions…" value={notes} onChange={e => setNotes(e.target.value)} style={{ minHeight:70 }} />

            <div style={{ display:"flex", gap:8 }}>
              <button className="btn-back" onClick={onClose} style={{ flex:1 }}>Cancel</button>

                {saving ? "Placing Order…" : `Place Order (${orderItems.length} item${orderItems.length!==1?"s":""})`}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function Portal({ onClose, rssLink, onRssUpdate }) {
      const [user, setUser]           = useState(() => {
        try { const s = localStorage.getItem("ea_admin_user"); return s ? JSON.parse(s) : null; } catch(e) { return null; }
      });
      const [tab, setTab]             = useState(() => localStorage.getItem("ea_admin_tab") || "results");
      const [menuOpen, setMenuOpen]   = useState(false);
      const [churches, setChurches]   = useState(CHURCHES);
      const [orderChurch, setOrderChurch] = useState(null);
      const [approvedChurches, setApprovedChurches] = useState([]);
      const [churchQueue, setChurchQueue] = useState([]);

      // Load persisted overrides from Supabase and merge into church data
      React.useEffect(() => {
        const timer = setTimeout(() => {
          loadChurchOverrides().then(overrides => {
            if (!overrides.length) return;
            setChurches(cs => {
              const existingIds = new Set(cs.map(c => c.id));

              // Merge overrides — only apply non-null values so we never erase hardcoded data
              const merged = cs.map(c => {
                const ov = overrides.find(o => Number(o.church_id) === c.id);
                if (!ov) return c;
                // Only pick fields that have actual values in the override
                const clean = {};
                Object.entries(ov).forEach(([k,v]) => {
                  if (v !== null && v !== undefined && v !== "" && k !== "church_id" && k !== "updated_at") {
                    clean[k] = v;
                  }
                });
                return { ...c, ...clean, distKampala: clean.dist_kampala || c.distKampala };
              });

              // Add brand new churches from Supabase that aren't in the hardcoded array
              const newChurches = overrides
                .filter(o => !existingIds.has(Number(o.church_id)) && o.pastor)
                .map(o => ({
                  id:           Number(o.church_id),
                  pastor:       o.pastor       || "",
                  church_name:  o.church_name  || "",
                  location:     o.location     || "",
                  region:       o.region       || "",
                  country:      o.country      || "",
                  members:      o.members      || 0,
                  standing:     o.standing     || "Stable",
                  language:     o.language     || "",
                  phone:        o.phone        || "",
                  whatsapp:     o.whatsapp     || "",
                  email:        o.email        || "",
                  internet:     o.internet     || "",
                  priority:     o.priority     || 0,
                  deploy_order: o.deploy_order || null,
                  distKampala:  o.dist_kampala || "",
                  lat:          o.lat          || 0,
                  lng:          o.lng          || 0,
                }));

              return [...merged, ...newChurches];
            });
          });
        }, 500);
        return () => clearTimeout(timer);
      }, []);

      React.useEffect(() => {
        syncSurveyNamesToQueue().then(() => {
          loadApprovedChurches().then(setApprovedChurches);
          loadChurchQueue().then(setChurchQueue);
        });
      }, []);

      // Update church locally and persist override to Supabase
      const updateChurch = (updated) => {
        // Handle delete
        if (updated._delete) {
          setChurches(cs => cs.filter(c => c.id !== updated.id));
          // Remove from Supabase
          fetch(`${SUPABASE_URL}/rest/v1/church_overrides?church_id=eq.${updated.id}`, {
            method: "DELETE",
            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
          }).catch(e => console.warn("delete church override:", e));
          return;
        }
        setChurches(cs => cs.map(c => c.id === updated.id ? { ...c, ...updated } : c));
        // If location changed and no coords, geocode
        if ((!updated.lat || updated.lat === 0) && (updated.location || updated.region)) {
          geocode(updated).then(coords => {
            if (coords.lat !== 0) setChurches(cs => cs.map(c => c.id === updated.id ? {...c, ...coords} : c));
            saveChurchOverride(updated.id, {
              deploy_order: updated.deploy_order||null, standing: updated.standing||null,
              spiritual_standing: updated.spiritual_standing||null, language: updated.language||null,
              members: updated.members||null, priority: updated.priority||null,
              bldg_type: updated.bldg_type||null, internet: updated.internet||null,
              cell_signal: updated.cell_signal||null, cell_quality: updated.cell_quality||null,
              cell_phone: updated.cell_phone||null, tablet: updated.tablet||null,
              elect_power: updated.elect_power||null, laptop: updated.laptop||null,
              sound_system: updated.sound_system||null, tv_screen: updated.tv_screen||null,
              dist_kampala: updated.distKampala||null, phone: updated.phone||null,
              whatsapp: updated.whatsapp||null, email: updated.email||null,
              church_name: updated.church_name||null, pastor: updated.pastor||null,
              location: updated.location||null, region: updated.region||null,
              country: updated.country||null,
              lat: coords.lat || updated.lat || null,
              lng: coords.lng || updated.lng || null,
            });
          });
        } else {
          saveChurchOverride(updated.id, {
            deploy_order: updated.deploy_order||null, standing: updated.standing||null,
            spiritual_standing: updated.spiritual_standing||null, language: updated.language||null,
            members: updated.members||null, priority: updated.priority||null,
            bldg_type: updated.bldg_type||null, internet: updated.internet||null,
            cell_signal: updated.cell_signal||null, cell_quality: updated.cell_quality||null,
            cell_phone: updated.cell_phone||null, tablet: updated.tablet||null,
            elect_power: updated.elect_power||null, laptop: updated.laptop||null,
            sound_system: updated.sound_system||null, tv_screen: updated.tv_screen||null,
            dist_kampala: updated.distKampala||null, phone: updated.phone||null,
            whatsapp: updated.whatsapp||null, email: updated.email||null,
            church_name: updated.church_name||null, pastor: updated.pastor||null,
            location: updated.location||null, region: updated.region||null,
            country: updated.country||null,
            lat: updated.lat||null, lng: updated.lng||null,
          });
        }
      };

      const TABS = [
        ["results",  "Results"],
        ["churches", "Churches"],
        ["orders",   "Orders"],
        ["map",      "Map"],
        ["users",    "Users"],
        ["settings", "Settings"],
      ];

      const login = (u) => {
        localStorage.setItem("ea_admin_user", JSON.stringify(u));
        setUser(u); setTab("results");
      };
      const logout = () => {
        localStorage.removeItem("ea_admin_user");
        localStorage.removeItem("ea_admin_tab");
        setUser(null);
      };
      const switchTab = (t) => {
        localStorage.setItem("ea_admin_tab", t);
        setTab(t); setMenuOpen(false);
      };

      if (!user) return (
        <div className="app">
          <nav className="nav">
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title" style={{ fontSize:12 }}>East Africa · Admin</span></div>
            <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:500, cursor:"pointer" }}>← Back</button>
          </nav>
          <PortalLogin onLogin={login} />
        </div>
      );

      return (
        <div className="app">
          {/* Nav */}
          <nav className="nav" style={{ gap:8 }}>
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title" style={{ fontSize:12 }}>East Africa · Admin</span></div>

            {/* Desktop tabs */}
            <div className="portal-desktop-tabs" style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ display:"flex", gap:2, background:"var(--surface3)", borderRadius:9, padding:3 }}>
                {TABS.map(([key,label]) => (
                  <button key={key} onClick={() => switchTab(key)} className={`nav-tab${tab===key?" active":""}`}>
                    {label}
                    {key==="churches" && churchQueue.length > 0 && (
                      <span style={{ marginLeft:5, background:"#FF9500", color:"#fff", borderRadius:10, fontSize:10, fontWeight:700, padding:"1px 6px", verticalAlign:"middle" }}>{churchQueue.length}</span>
                    )}
                  </button>
                ))}
              </div>
              <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:500, cursor:"pointer", whiteSpace:"nowrap" }}>← Survey</button>
              <button onClick={logout} style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Out</button>
            </div>

            {/* Mobile hamburger */}
            <div className="portal-mobile-tabs" style={{ display:"none", alignItems:"center", gap:8 }}>
              <button onClick={onClose} style={{ border:"none", background:"var(--surface3)", color:"var(--text-muted)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:500, cursor:"pointer" }}>← Back</button>
              <button onClick={() => setMenuOpen(m=>!m)} style={{ border:"1px solid var(--border-strong)", background:"var(--surface)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:600, cursor:"pointer", color:"var(--text-secondary)" }}>
                {TABS.find(t=>t[0]===tab)?.[1]} ▾
              </button>
              <button onClick={logout} style={{ border:"none", background:"var(--danger-light)", color:"var(--danger)", borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:600, cursor:"pointer" }}>Out</button>
            </div>
          </nav>

          {/* Mobile dropdown menu */}
          {menuOpen && (
            <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:14, margin:"8px 16px", padding:6, boxShadow:"var(--shadow-md)", position:"relative", zIndex:50 }}>
              {TABS.map(([key,label]) => (
                <button key={key} onClick={() => switchTab(key)}
                  style={{ display:"block", width:"100%", textAlign:"left", padding:"11px 14px", border:"none", background: tab===key?"var(--accent-light)":"transparent", borderRadius:10, fontSize:14, fontWeight: tab===key?600:400, color: tab===key?"var(--accent)":"var(--text)", cursor:"pointer", marginBottom:2 }}>
                  {label}
                </button>
              ))}
            </div>
          )}

          <div style={{ flex:1, overflowX:"hidden" }}>
            {tab==="results"  && <SurveyResults />}
            {tab==="churches" && <ChurchDatabase churches={churches} approvedChurches={approvedChurches} churchQueue={churchQueue} onQueueAction={() => { loadChurchQueue().then(setChurchQueue); loadApprovedChurches().then(setApprovedChurches); }} onPlaceOrder={c => setOrderChurch(c)} onAdd={async c => {
              const newId = 900000 + Math.floor(Math.random() * 99999);
              const newChurch = {...c, id:newId, lat:0, lng:0};
              setChurches(cs=>[...cs, newChurch]);
              // Geocode location → get coordinates automatically
              const coords = await geocode(newChurch);
              const withCoords = { ...newChurch, ...coords };
              if (coords.lat !== 0) setChurches(cs => cs.map(ch => ch.id === newId ? withCoords : ch));
              // Persist to Supabase
              saveChurchOverride(newId, {
                deploy_order:       c.deploy_order || null,
                standing:           c.standing || "Stable",
                spiritual_standing: c.spiritual_standing || null,
                language:           c.language || null,
                members:            c.members || null,
                priority:           c.priority || null,
                bldg_type:          c.bldg_type || null,
                internet:           c.internet || null,
                cell_signal:        c.cell_signal || null,
                cell_quality:       c.cell_quality || null,
                cell_phone:         c.cell_phone || null,
                tablet:             c.tablet || null,
                elect_power:        c.elect_power || null,
                laptop:             c.laptop || null,
                sound_system:       c.sound_system || null,
                tv_screen:          c.tv_screen || null,
                dist_kampala:       c.distKampala || null,
                phone:              c.phone || null,
                whatsapp:           c.whatsapp || null,
                email:              c.email || null,
                church_name:        c.church_name || null,
                pastor:             c.pastor || null,
                location:           c.location || null,
                region:             c.region || null,
                country:            c.country || null,
                lat:                coords.lat || null,
                lng:                coords.lng || null,
              });
            }} onUpdate={updateChurch} />}
            {tab==="orders"   && <OrdersTab />}
            {tab==="map"      && <ChurchMap churches={churches} />}
            {tab==="users"    && <AdminUsers />}
            {tab==="settings" && <PortalSettings rssLink={rssLink} onRssUpdate={onRssUpdate} />}
          </div>

          {/* Place Order Modal */}
          {orderChurch && (
            <PlaceOrderModal
              church={orderChurch}
              onClose={() => setOrderChurch(null)}
              onOrderPlaced={() => {}}
            />
          )}
        </div>
      );
    }

    async function fetchRallyPoints() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rally_points?select=*&order=name`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        });
        const rows = await res.json();
        if (Array.isArray(rows) && rows.length) {
          return rows.map(r => ({ id:r.id, name:r.name, lat:parseFloat(r.lat), lng:parseFloat(r.lng), radiusMiles:r.radius_miles||50, color:r.color||"#87CEEB" }));
        }
      } catch(e) { console.warn("fetchRallyPoints:", e.message); }
      return null;
    }

    async function upsertRallyPoint(rp) {
      await fetch(`${SUPABASE_URL}/rest/v1/rally_points`, {
        method: "POST",
        headers: { "Content-Type":"application/json", apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, Prefer:"resolution=merge-duplicates,return=minimal" },
        body: JSON.stringify({ id: typeof rp.id === "string" ? rp.id : undefined, name:rp.name, lat:rp.lat, lng:rp.lng, radius_miles:rp.radiusMiles, color:rp.color, updated_at:new Date().toISOString() }),
      });
    }

    async function deleteRallyPoint(id) {
      await fetch(`${SUPABASE_URL}/rest/v1/rally_points?id=eq.${id}`, {
        method: "DELETE",
        headers: { apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` },
      });
    }

    
    function TrackingPage({ orderNumber }) {
      const [order, setOrder]     = useState(null);
      const [error, setError]     = useState(false);
      const [loading, setLoading] = useState(true);

      // Inline color constants — works without CSS vars
      const C = { bg:"#f7f7f7", surface:"#fff", border:"#e5e5e5", text:"#1d1d1f", muted:"#86868b", accent:"#007AFF", success:"#34C759", shadow:"0 1px 4px rgba(0,0,0,0.08)" };

      React.useEffect(() => {
        fetch(`${SUPABASE_URL}/rest/v1/orders?order_number=eq.${encodeURIComponent(orderNumber)}&select=*&limit=1`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        })
          .then(r => r.json())
          .then(rows => { if (rows?.[0]) setOrder(rows[0]); else setError(true); setLoading(false); })
          .catch(() => { setError(true); setLoading(false); });
      }, []);

      const STEPS = [
        { key:"New",         label:"Order Received", desc:"Your order has been logged and is awaiting processing." },
        { key:"In Progress", label:"Being Prepared",  desc:"Your order is being prepared and packed." },
        { key:"Shipped",     label:"On Its Way",      desc:"Your order is on its way. Check tracking info below." },
      ];
      const si = order ? STEPS.findIndex(s => s.key === order.status) : -1;

      if (loading) return (
        <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"-apple-system,sans-serif" }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ width:34, height:34, border:`2px solid ${C.border}`, borderTopColor:C.accent, borderRadius:"50%", animation:"spin 0.8s linear infinite", margin:"0 auto 12px" }} />
            <div style={{ color:C.muted, fontSize:13 }}>Loading order…</div>
          </div>
        </div>
      );

      if (error || !order) return (
        <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"-apple-system,sans-serif", padding:24 }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:16 }}>🔍</div>
            <div style={{ fontSize:20, fontWeight:700, marginBottom:8 }}>Order Not Found</div>
            <div style={{ color:C.muted, fontSize:14, lineHeight:1.6 }}>No order found for <strong>{orderNumber}</strong>.<br/>Check the link and try again.</div>
          </div>
        </div>
      );

      const items = typeof order.items === "string" ? JSON.parse(order.items) : (order.items || []);
      const orderedAt = new Date(order.created_at).toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });

      return (
        <div style={{ minHeight:"100vh", background:C.bg, fontFamily:"-apple-system,'Inter',BlinkMacSystemFont,sans-serif", color:C.text, paddingBottom:80 }}>
          <nav style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"0 24px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:28, height:28, borderRadius:8, background:"rgba(0,122,255,0.1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>🌍</div>
              <span style={{ fontSize:14, fontWeight:600, letterSpacing:"-0.01em" }}>LCA East Africa</span>
            </div>
            <span style={{ fontSize:12, color:C.muted, letterSpacing:"0.04em", textTransform:"uppercase" }}>Order Tracking</span>
          </nav>

          <div style={{ maxWidth:640, margin:"0 auto", padding:"44px 20px 0" }}>
            {/* Hero */}
            <div style={{ textAlign:"center", marginBottom:40 }}>
              <div style={{ display:"inline-block", padding:"5px 14px", background:"rgba(0,122,255,0.08)", borderRadius:100, border:"1px solid rgba(0,122,255,0.2)", fontSize:12, fontWeight:600, color:C.accent, letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:14 }}>Order Reference</div>
              <div style={{ fontSize:32, fontWeight:800, letterSpacing:"0.06em", fontFamily:"monospace", marginBottom:8 }}>{order.order_number}</div>
              <div style={{ fontSize:14, color:C.muted }}>{order.church_name||order.pastor_name} · {orderedAt}</div>
            </div>


            {/* Progress — flex layout with inline connectors */}
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:20, padding:"32px 28px", marginBottom:14, boxShadow:C.shadow }}>
              <div style={{ display:"flex", alignItems:"flex-start" }}>
                {STEPS.map((step, i) => {
                  const done=i<si, cur=i===si, fut=i>si;
                  return (
                    <React.Fragment key={step.key}>
                      {/* Step */}
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:1 }}>
                        <div style={{ width:44, height:44, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:14, transition:"all 0.4s", background:done?C.accent:cur?C.surface:"#f2f2f7", border:done?"none":cur?`2px solid ${C.accent}`:`1.5px solid ${C.border}`, color:done?"#fff":cur?C.accent:"#aaa", boxShadow:cur?`0 0 0 5px rgba(0,122,255,0.1)`:"none" }}>
                          {done
                            ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                            : i===0 ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            : i===1 ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                            : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                          }
                        </div>
                        <div style={{ fontSize:13, fontWeight:600, color:fut?"#aaa":cur?C.accent:C.text, textAlign:"center", marginBottom:4 }}>{step.label}</div>
                        {cur && <div style={{ fontSize:12, color:C.muted, textAlign:"center", lineHeight:1.5, maxWidth:130 }}>{step.desc}</div>}
                      </div>
                      {/* Connector line — only between steps */}
                      {i < STEPS.length - 1 && (
                        <div style={{ width:60, height:2, marginTop:22, flexShrink:0, background: i < si ? C.accent : "#e5e5e5", borderRadius:2, transition:"background 0.5s" }} />
                      )}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>

            {/* Status callout */}
            <div style={{ background:si===2?"rgba(52,199,89,0.07)":C.surface, border:`1px solid ${si===2?"rgba(52,199,89,0.25)":C.border}`, borderRadius:14, padding:"16px 20px", marginBottom:14, display:"flex", alignItems:"center", gap:14, boxShadow:C.shadow }}>
              <div style={{ width:40, height:40, borderRadius:12, background:si===2?"rgba(52,199,89,0.1)":"rgba(0,122,255,0.09)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                {si===0&&<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>}
                {si===1&&<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>}
                {si===2&&<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.success} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>}
              </div>
              <div>
                <div style={{ fontSize:15, fontWeight:700, marginBottom:2, color:si===2?C.success:C.text }}>{STEPS[Math.max(0,si)]?.label}</div>
                <div style={{ fontSize:13, color:C.muted }}>{STEPS[Math.max(0,si)]?.desc}</div>
              </div>
            </div>

            {/* Carrier/tracking */}
            {order.tracking_number && (
              <div style={{ background:"rgba(0,122,255,0.06)", border:"1px solid rgba(0,122,255,0.18)", borderRadius:14, padding:"16px 20px", marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", color:C.accent, marginBottom:10 }}>Shipment Tracking</div>
                <div style={{ display:"flex", alignItems:"center", gap:16, flexWrap:"wrap" }}>
                  {order.carrier && <div style={{ fontSize:13, color:C.muted }}>{order.carrier}</div>}
                  <div style={{ fontFamily:"monospace", fontSize:15, fontWeight:700, letterSpacing:"0.06em" }}>{order.tracking_number}</div>
                </div>
              </div>
            )}

            {/* Items */}
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, overflow:"hidden", marginBottom:14, boxShadow:C.shadow }}>
              <div style={{ padding:"13px 18px", borderBottom:`1px solid ${C.border}`, fontSize:11, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", color:C.muted }}>Order Contents</div>
              {items.map((item,i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 18px", borderBottom:i<items.length-1?`1px solid ${C.border}`:"none" }}>
                  <span style={{ fontSize:14 }}>{item.name}</span>
                  <span style={{ fontSize:13, fontWeight:600, color:C.accent, fontFamily:"monospace" }}>×{item.qty}</span>
                </div>
              ))}
            </div>

            {/* Delivery */}
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"16px 18px", boxShadow:C.shadow }}>
              <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", color:C.muted, marginBottom:12 }}>Delivery Info</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                {[["Church",order.church_name||order.pastor_name],["Region",order.region],["Country",order.country],["Ordered",orderedAt]].filter(([,v])=>v).map(([k,v]) => (
                  <div key={k}><div style={{ fontSize:11, color:C.muted, marginBottom:3 }}>{k}</div><div style={{ fontSize:14, fontWeight:500 }}>{v}</div></div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }
    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState(() => {
        try { return localStorage.getItem("ea_view") || "survey"; } catch(e) { return "survey"; }
      });
      const [rssLink, setRssLink] = useState(DEFAULT_RSS);

      // Check for tracking URL param — ?track=EAO-00001
      const trackParam = new URLSearchParams(window.location.search).get("track");
      if (trackParam) return <TrackingPage orderNumber={trackParam} />;

      const switchView = (v) => {
        try { localStorage.setItem("ea_view", v); } catch(e) {}
        setView(v);
      };

      React.useEffect(() => {
        loadSettings().then(() => setRssLink(LIVE_RSS_LINK));
      }, []);

      if (view === "portal") return <Portal onClose={() => switchView("survey")} rssLink={rssLink} onRssUpdate={link => { LIVE_RSS_LINK = link; setRssLink(link); }} />;
      return (
        <div className="app">
          <nav className="nav">
            <div className="nav-logo"><div className="nav-dot" /><span className="nav-title">East Africa Audio Survey</span></div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div className="nav-tabs">
                <button className={`nav-tab${view==="survey"?" active":""}`} onClick={() => switchView("survey")}>Survey</button>
                <button className={`nav-tab${view==="dashboard"?" active":""}`} onClick={() => switchView("dashboard")}>Dashboard</button>
              </div>
              <button onClick={() => switchView("portal")} style={{ display:"flex", alignItems:"center", gap:5, border:"1px solid var(--border-strong)", background:"var(--surface)", color:"var(--text-secondary)", borderRadius:8, padding:"5px 11px", fontSize:13, fontWeight:600, cursor:"pointer", transition:"all 0.15s", letterSpacing:"-0.01em", whiteSpace:"nowrap" }}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span className="portal-btn-label">Portal</span>
              </button>
            </div>
          </nav>
          <div className="survey-wrap">
            {view === "survey" ? <SurveyWizard /> : <Dashboard />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
